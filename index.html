<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zomraa v2 - قطرة حياة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
        darkMode: 'class', 
        theme: { extend: { fontFamily: { sans: ['Cairo', 'sans-serif'] }, colors: { brand: { accent: '#CDEB57', accentHover: '#b9d64a' } } } } 
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Cairo', sans-serif; transition: background 0.3s ease, color 0.3s ease; -webkit-tap-highlight-color: transparent; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); background-color: #F8FAFC; color: #1e293b; }
    .glass-panel { background-color: #ffffff; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    .custom-input { background-color: #f8fafc; border: 1px solid #e2e8f0; color: #1e293b; }
    .custom-input::placeholder { color: #94a3b8; }
    .custom-select option { background-color: #ffffff; color: #1e293b; }
    
    html.dark body { background: linear-gradient(145deg, #0f172a 0%, #020617 100%); background-attachment: fixed; color: #f8fafc; }
    html.dark .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
    html.dark .custom-input { background-color: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: #f8fafc; }
    html.dark .custom-input::placeholder { color: #94a3b8; }
    html.dark .custom-select option { background-color: #1e293b; color: #f8fafc; }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, deleteUser, sendPasswordResetEmail } from 'firebase/auth';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy, addDoc, updateDoc, arrayUnion, arrayRemove } from 'firebase/firestore';
    import { 
        Search, MapPin, Map, Plus, User, Phone, Copy, CheckCircle2, AlertTriangle, 
        X, Loader2, Droplet, Lock, Mail, Eye, EyeOff, ArrowRight, LogOut, 
        Power, Edit2, Save, Trash2, Plane, Info, HelpCircle, Moon, Sun, 
        Home, Heart, CalendarClock, ShieldCheck, RotateCcw, Stethoscope, Pill, 
        Clock, HeartHandshake, Star, Flag, FileText, Ban, AlertOctagon, Wallet, 
        Package, ChevronDown, ChevronUp, MessageSquare, Bell, HeartPulse, EyeOff as EyeOffIcon
    } from 'lucide-react';

    const firebaseConfig = { apiKey: "AIzaSyANXo96l5_hP1iTH_K8TaYixdGHJwr6x-0", authDomain: "blod-6a25b.firebaseapp.com", projectId: "blod-6a25b", storageBucket: "blod-6a25b.firebasestorage.app", messagingSenderId: "766563585970", appId: "1:766563585970:web:ad99353f2dbcbf759a1eab" };
    let app; try { app = initializeApp(firebaseConfig); } catch(e) {}
    const auth = getAuth(app); const db = getFirestore(app);
    const DONORS_COLLECTION = "donors"; const MEDICINES_COLLECTION = "medicines"; const PHARMACIES_COLLECTION = "pharmacies"; const REPORTS_COLLECTION = "reports"; const NOTIFICATIONS_COLLECTION = "notifications";
    const COOLDOWN_DAYS = 90;

    // --- 1. Reusable Core Components (التهذيب والضغط) ---

    function BaseModal({ isOpen, onClose, children, hideClose = false }) {
        if (!isOpen) return null;
        return (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm animate-fadeIn p-4">
                <div className="glass-panel w-full max-w-sm rounded-[2.5rem] p-6 sm:p-8 shadow-2xl relative overflow-hidden text-right max-h-[90vh] overflow-y-auto no-scrollbar">
                    {!hideClose && <button onClick={onClose} className="absolute top-4 left-4 p-2 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition z-10"><X size={20}/></button>}
                    {children}
                </div>
            </div>
        );
    }

    function EmptyState({ icon: Icon, title, desc }) {
        return (
            <div className="text-center py-20 glass-panel rounded-[2rem] mx-4 border border-slate-200 dark:border-slate-800 animate-fadeIn">
                <div className="w-20 h-20 mx-auto mb-4 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-full flex items-center justify-center opacity-70"><Icon size={40} className="text-slate-300 dark:text-slate-600"/></div>
                <p className="text-slate-600 dark:text-slate-300 font-bold">{title}</p>
                <p className="text-slate-400 dark:text-slate-500 text-sm mt-2 px-4 leading-relaxed">{desc}</p>
            </div>
        );
    }

    function Toast({ notification }) {
      if (!notification) return null;
      const isSuccess = notification.type === 'success';
      return (
        <div className={`fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl border z-[110] flex items-center gap-2 font-bold animate-fadeIn w-max max-w-[90%] ${isSuccess ? 'bg-brand-accent text-slate-900 border-brand-accentHover' : 'glass-panel text-red-500 dark:text-red-400 border-red-200 dark:border-red-500/30'}`}>
          {isSuccess ? <CheckCircle2 size={18} className="shrink-0"/> : <AlertTriangle size={18} className="shrink-0"/>} 
          <span className="text-sm">{notification.msg}</span>
        </div>
      );
    }

    // --- 2. Modals ---

    function CustomModal({ isOpen, title, message, onConfirm, onCancel, isDestructive, confirmText }) {
      return (
        <BaseModal isOpen={isOpen} hideClose={true}>
            <div className={`w-12 h-12 rounded-full flex items-center justify-center mb-4 mx-auto ${isDestructive ? 'bg-red-100 dark:bg-red-500/20 text-red-500 dark:text-red-400' : 'bg-emerald-100 dark:bg-brand-accent/20 text-emerald-600 dark:text-brand-accent'}`}>{isDestructive ? <AlertTriangle size={24}/> : <Info size={24}/>}</div>
            <h3 className="text-xl font-black text-slate-800 dark:text-white text-center mb-2">{title}</h3>
            <p className="text-slate-500 dark:text-slate-400 text-center mb-6 text-sm leading-relaxed whitespace-pre-line">{message}</p>
            <div className="flex gap-3">
              <button onClick={onCancel} className="flex-1 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition">إلغاء</button>
              <button onClick={onConfirm} className={`flex-1 py-3 rounded-xl font-bold transition shadow-lg ${isDestructive ? 'bg-red-500 text-white hover:bg-red-600' : 'bg-emerald-500 dark:bg-brand-accent text-white dark:text-slate-900 hover:bg-emerald-600'}`}>{confirmText}</button>
            </div>
        </BaseModal>
      );
    }

    function ForgotPasswordModal({ isOpen, onClose, showNotification }) {
      const [email, setEmail] = useState(''); const [loading, setLoading] = useState(false);
      const handleReset = async (e) => {
        e.preventDefault(); if(!email) return; setLoading(true);
        try { await sendPasswordResetEmail(auth, email); showNotification('success', 'تم إرسال الرابط.'); onClose(); } 
        catch (err) { showNotification('error', 'البريد غير صحيح.'); } finally { setLoading(false); }
      };
      return (
        <BaseModal isOpen={isOpen} onClose={onClose}>
            <div className="w-16 h-16 bg-emerald-50 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><Lock size={30} className="text-emerald-500 dark:text-brand-accent"/></div>
            <h3 className="text-xl font-black text-slate-800 dark:text-white text-center mb-2">نسيت كلمة المرور؟</h3>
            <p className="text-slate-500 dark:text-slate-400 text-center mb-6 text-sm">أدخل بريدك المسجل لدينا.</p>
            <form onSubmit={handleReset} className="space-y-4">
                <div className="relative"><input type="email" placeholder="البريد الإلكتروني" className="custom-input w-full h-12 px-4 rounded-xl text-right pr-4 pl-12 outline-none focus:border-brand-accent" value={email} onChange={e=>setEmail(e.target.value)} required /><Mail size={20} className="absolute left-4 top-3.5 text-slate-400"/></div>
                <button type="submit" disabled={loading} className="w-full h-12 bg-emerald-500 dark:bg-brand-accent text-white dark:text-slate-900 rounded-xl font-bold shadow-lg flex items-center justify-center">{loading ? <Loader2 className="animate-spin" size={20}/> : 'إرسال الرابط'}</button>
            </form>
        </BaseModal>
      );
    }

    function AboutModal({ isOpen, onClose }) {
      return (
        <BaseModal isOpen={isOpen} onClose={onClose}>
            <div className="text-center">
                <div className="w-20 h-20 bg-emerald-50 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><Droplet size={40} className="text-emerald-500 dark:text-brand-accent" fill="currentColor"/></div>
                <h2 className="text-2xl font-black text-emerald-600 dark:text-brand-accent mb-1">Zomraa</h2>
                <p className="text-xs text-slate-400 font-bold uppercase tracking-widest mb-6">Zomraa v2 (2.0.0)</p>
                <div className="bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-4 mb-6 border border-slate-100 dark:border-slate-800"><p className="text-slate-600 dark:text-slate-300 text-sm leading-relaxed">تطبيق خيري وطبي متكامل، يهدف لربط المتبرعين بالمحتاجين، وتوفير الأدوية المفقودة بسهولة.</p></div>
                <div className="space-y-2"><p className="text-xs font-bold text-slate-400">تصميم وتطوير</p><h3 className="text-lg font-bold text-slate-800 dark:text-white">مطور التطبيق</h3></div>
            </div>
        </BaseModal>
      );
    }

    function ReportModal({ isOpen, onClose, onConfirm, donorName }) {
      const [reason, setReason] = useState(''); const [loading, setLoading] = useState(false);
      const handleSubmit = async () => { if(!reason) return; setLoading(true); await onConfirm(reason); setLoading(false); };
      return (
        <BaseModal isOpen={isOpen} onClose={onClose}>
            <div className="w-12 h-12 bg-red-50 dark:bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4"><Flag size={24} className="text-red-500 dark:text-red-400"/></div>
            <h3 className="text-xl font-black text-slate-800 dark:text-white text-center mb-2">إبلاغ عن متبرع</h3>
            <p className="text-slate-500 text-center mb-4 text-sm">أنت تبلغ عن <strong className="text-slate-700 dark:text-white">{donorName}</strong>.</p>
            <div className="space-y-2 mb-6">
                {['الرقم خاطئ / لا يعمل', 'الشخص لا يرد أبداً', 'يطلب مقابلاً مالياً', 'حساب وهمي'].map(r => (
                    <label key={r} className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer ${reason===r?'bg-red-50 border-red-500 text-red-700 dark:bg-red-500/20 dark:border-red-400 dark:text-red-300':'bg-slate-50 border-slate-200 text-slate-600 dark:bg-slate-900/50 dark:border-slate-700'}`}>
                        <input type="radio" value={r} checked={reason===r} onChange={()=>setReason(r)} className="w-4 h-4 accent-red-500" />
                        <span className="text-sm font-bold">{r}</span>
                    </label>
                ))}
            </div>
            <button onClick={handleSubmit} disabled={loading || !reason} className="w-full h-12 bg-red-500 text-white rounded-xl font-bold flex items-center justify-center disabled:opacity-50">{loading ? <Loader2 className="animate-spin" size={20}/> : 'تأكيد الإبلاغ'}</button>
        </BaseModal>
      );
    }

    function NotificationsModal({ isOpen, onClose, notifications = [], markAsRead, deleteNotification, rejectRequest, showNotification }) {
      if (!isOpen) return null;
      const safeNotifications = Array.isArray(notifications) ? notifications : [];
      const unreadCount = safeNotifications.filter(n => !n.read).length;

      const handleCopyText = (e, text) => {
          e.stopPropagation();
          navigator.clipboard.writeText(text);
          showNotification('success', 'تم نسخ النص');
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm animate-fadeIn p-0 sm:p-4">
          <div className="glass-panel w-full sm:max-w-md bg-white dark:bg-slate-900 rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 shadow-2xl relative border-t sm:border border-slate-200 dark:border-slate-700 max-h-[90vh] overflow-y-auto no-scrollbar animate-[translateY_0.3s_ease-out]">
            <button onClick={onClose} className="absolute top-6 left-6 p-2 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-500 hover:text-slate-800 dark:hover:text-white transition"><X size={20}/></button>
            <h3 className="text-xl font-black text-slate-800 dark:text-white text-right mb-6 mt-2 flex items-center justify-end gap-2">
                {unreadCount > 0 && <span className="bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">{unreadCount}</span>}
                الإشعارات <Bell className="text-emerald-500 dark:text-brand-accent"/> 
            </h3>
            
            {safeNotifications.length === 0 ? (
                <EmptyState icon={Bell} title="لا توجد إشعارات حالياً" desc="عندما يطلب أحدهم تبرعك، سيظهر لك إشعار هنا." />
            ) : (
                <div className="space-y-3">
                   {safeNotifications.map(notif => {
                       const notifDate = notif.createdAt?.toDate ? new Intl.DateTimeFormat('ar-DZ', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }).format(notif.createdAt.toDate()) : 'الآن';
                       const callerPhone = notif.fromUserPhone ? (String(notif.fromUserPhone).startsWith('0') ? notif.fromUserPhone : `0${notif.fromUserPhone}`) : null;
                       const isRequest = notif.type === 'request';

                       return (
                           <div key={notif.id} className={`p-4 rounded-2xl border transition-colors text-right relative ${notif.read ? 'bg-slate-50 dark:bg-slate-900/50 border-slate-100 dark:border-slate-800 opacity-70' : 'bg-white dark:bg-slate-800 border-emerald-200 dark:border-brand-accent/30 shadow-sm'}`} onClick={() => !notif.read && markAsRead(notif.id)}>
                               {!notif.read && <div className="absolute top-4 left-4 w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></div>}
                               
                               <h4 className="font-bold text-slate-800 dark:text-white text-sm mb-1">{notif.title}</h4>
                               <p className="text-slate-600 dark:text-slate-300 text-xs leading-relaxed mb-3 whitespace-pre-line">{notif.body}</p>
                               
                               <div className="flex flex-col gap-2 mt-2 pt-3 border-t border-slate-100 dark:border-slate-700">
                                   {isRequest && callerPhone && (
                                       <div className="flex items-center gap-2 mb-1 w-full">
                                            <a href={`tel:${callerPhone}`} onClick={(e) => e.stopPropagation()} className="flex-1 bg-emerald-500 text-white p-2 rounded-xl text-xs font-bold text-center flex items-center justify-center gap-1"><Phone size={14}/> اتصال</a>
                                            <button onClick={(e) => { e.stopPropagation(); rejectRequest(notif); }} className="flex-1 bg-white dark:bg-slate-900 border border-red-200 text-red-500 p-2 rounded-xl text-xs font-bold flex items-center justify-center gap-1">اعتذار ❌</button>
                                       </div>
                                   )}
                                   
                                   <div className="flex items-center justify-between w-full">
                                        <div className="flex gap-2">
                                            <button onClick={(e) => handleCopyText(e, notif.body)} className="bg-slate-100 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg text-[10px] font-bold flex items-center gap-1"><Copy size={12}/> نسخ</button>
                                            <button onClick={(e) => { e.stopPropagation(); deleteNotification(notif.id); }} className="bg-slate-100 dark:bg-slate-700/50 text-slate-500 px-3 py-1.5 rounded-lg text-[10px] font-bold flex items-center gap-1"><Trash2 size={12}/> حذف</button>
                                        </div>
                                        <span className="text-[10px] text-slate-400 font-bold">{notifDate}</span>
                                   </div>
                               </div>
                           </div>
                       )
                   })}
                </div>
            )}
          </div>
        </div>
      );
    }

    // --- 3. Layout Components ---

    function AppHeader({ isDark, toggleTheme, setView, notifications = [], markAsRead, deleteNotification, rejectRequest, showNotification }) {
      const [showAbout, setShowAbout] = useState(false);
      const [showNotifications, setShowNotifications] = useState(false);
      const safeNotifications = Array.isArray(notifications) ? notifications : [];
      const unreadCount = safeNotifications.filter(n => !n.read).length;

      return (
        <>
          <div className="sticky top-0 z-40 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-b border-slate-200 dark:border-slate-800 px-4 py-4 flex justify-between items-center mb-6 shadow-sm relative">
             <div className="flex items-center gap-2 shrink-0">
                 <button onClick={() => setView('home')} className="w-10 h-10 glass-panel rounded-full flex items-center justify-center text-slate-500 hover:text-emerald-600 dark:hover:text-brand-accent transition"><Home size={20}/></button>
                 <button onClick={toggleTheme} className="w-10 h-10 glass-panel rounded-full flex items-center justify-center text-slate-500 transition"><span className="dark:hidden"><Moon size={20}/></span><span className="hidden dark:block"><Sun size={20}/></span></button>
             </div>
             <div className="absolute left-1/2 -translate-x-1/2 text-center font-black text-emerald-600 dark:text-brand-accent text-2xl tracking-wider">Zomraa</div>
             <div className="flex items-center gap-2 shrink-0">
                 <button onClick={() => setShowNotifications(true)} className="relative w-10 h-10 glass-panel rounded-full flex items-center justify-center text-slate-500 transition hover:text-emerald-500">
                    <Bell size={20}/>
                    {unreadCount > 0 && <span className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white text-[10px] font-bold flex items-center justify-center rounded-full border-2 border-white dark:border-slate-900 shadow-sm animate-pulse">{unreadCount > 9 ? '+9' : unreadCount}</span>}
                 </button>
                 <button onClick={() => setShowAbout(true)} className="w-10 h-10 glass-panel rounded-full flex items-center justify-center text-slate-500 transition"><HelpCircle size={20}/></button>
             </div>
          </div>
          <AboutModal isOpen={showAbout} onClose={() => setShowAbout(false)} />
          <NotificationsModal isOpen={showNotifications} onClose={() => setShowNotifications(false)} notifications={safeNotifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />
        </>
      );
    }

    function BottomNav({ view, setView, user }) {
      const showNav = ['home', 'profile', 'pharmacy', 'medicines', 'doctors'].includes(view);
      if (!showNav) return null;

      const NavBtn = ({ id, icon: Icon, text }) => (
          <button onClick={() => setView(id)} className={`flex flex-col items-center justify-center gap-1 w-[18%] h-full transition-colors ${view === id ? 'text-emerald-500 dark:text-brand-accent' : 'text-slate-400 hover:text-slate-600'}`}>
              <Icon size={22} className={view === id ? "fill-current" : ""} />
              <span className="text-[10px] font-bold">{text}</span>
          </button>
      );

      return (
        <div className="fixed bottom-0 left-0 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 z-50 pb-[env(safe-area-inset-bottom)]">
          <div className="flex justify-around items-center h-16 relative px-2">
            <NavBtn id="doctors" icon={HeartPulse} text="أطباء" />
            <NavBtn id="pharmacy" icon={Stethoscope} text="صيدليات" />
            
            <div className="w-[18%]"></div> {/* مساحة الزر العائم في المنتصف */}
            
            <NavBtn id="medicines" icon={Pill} text="أدوية" />
            <button onClick={() => user ? setView('profile') : setView('login')} className={`flex flex-col items-center justify-center gap-1 w-[18%] h-full transition-colors ${['profile','login','register'].includes(view) ? 'text-emerald-500 dark:text-brand-accent' : 'text-slate-400 hover:text-slate-600'}`}>
                <User size={22} className={view==='profile'?"fill-current":""} />
                <span className="text-[10px] font-bold">{user?'حسابي':'دخول'}</span>
            </button>
            
            {/* الزر العائم في المنتصف: رمز القلب، يأخذ للرئيسية - مع حواف ملونة لتكون واضحة */}
            <button onClick={() => setView('home')} className={`absolute left-1/2 -translate-x-1/2 -top-6 w-14 h-14 rounded-full shadow-[0_8px_20px_rgba(16,185,129,0.3)] flex items-center justify-center transition-transform hover:scale-110 active:scale-95 border-4 border-emerald-100 dark:border-slate-700 ${view === 'home' ? 'bg-emerald-500 dark:bg-brand-accent text-white dark:text-slate-900' : 'bg-brand-accent text-slate-900'}`}>
                <Heart size={26} fill={view === 'home' ? "currentColor" : "none"} strokeWidth={view === 'home' ? 0 : 2.5} />
            </button>
          </div>
        </div>
      );
    }

    // --- 4. Cards ---

    function DonorCard({ donor, user, onCopyPhone, onRate, onReport, onSendRequest }) {
      if (!donor) return null;
      const isAvailable = donor.status !== 0; const isPhoneHidden = donor.isPhoneHidden === true;
      const fullPhone = donor.phone ? (String(donor.phone).startsWith('0') ? donor.phone : `0${donor.phone}`) : '';
      const safeRaters = Array.isArray(donor.raters) ? donor.raters : [];
      const ratingCount = safeRaters.length;
      const hasRated = user && safeRaters.includes(user.uid);
      const [cooldown, setCooldown] = useState(false);
      
      useEffect(() => {
          const lastSent = localStorage.getItem(`notify_${donor.id}`);

          {showDetails && (

                <div className="grid grid-cols-2 gap-2 mb-3 text-right">

                   <div className="bg-slate-50 dark:bg-slate-900/50 p-2.5 rounded-xl border border-slate-100 dark:border-slate-800"><span className="text-[10px] font-bold text-slate-400 block mb-0.5">الوصفة</span><span className={`text-sm font-black ${medicine.hasPrescription === 'yes' ? 'text-emerald-600' : 'text-slate-700 dark:text-white'}`}>{medicine.hasPrescription === 'yes' ? 'متوفرة' : 'لا توجد'}</span></div>
                   <div className="bg-slate-50 dark:bg-slate-900/50 p-2.5 rounded-xl border border-slate-100 dark:border-slate-800"><span className="text-[10px] font-bold text-slate-400 block mb-0.5">الدفع</span><span className="text-sm font-black text-slate-700 dark:text-white">{medicine.paymentStatus === 'buy' ? 'للشراء' : 'صدقة'}</span></div>
                   <div className="bg-slate-50 dark:bg-slate-900/50 p-2.5 rounded-xl border border-slate-100 dark:border-slate-800"><span className="text-[10px] font-bold text-slate-400 block mb-0.5">بالصيدليات</span><span className="text-sm font-black text-slate-700 dark:text-white">{medicine.availability === 'unavailable' ? 'مقطوع' : 'غالي'}</span></div>

             </div>

          <div className="flex flex-col gap-2 border-t border-slate-100 dark:border-slate-800/50 pt-3">
              {medicine.status === 'pending' && !isMine && medicine.approved && <button onClick={() => onFulfill(medicine.id, userProfile)} className="w-full py-3 bg-brand-accent text-slate-900 rounded-xl font-bold flex items-center justify-center gap-2"><HeartHandshake size={18}/> أتعهد بتوفير هذا الدواء</button>}
              {medicine.status === 'pending' && isMine && !medicine.approved && <div className="w-full py-3 bg-orange-50 dark:bg-orange-500/20 text-orange-600 dark:text-orange-400 rounded-xl font-bold text-center text-sm border border-orange-200 dark:border-orange-500/30">طلبك قيد المراجعة</div>}
              {medicine.status === 'pending' && isMine && medicine.approved && <div className="w-full py-3 bg-slate-100 dark:bg-slate-800 text-slate-500 rounded-xl font-bold text-center text-sm border border-slate-200 dark:border-slate-700">منشور بانتظار متبرع</div>}
              
              {isInProgress && (isMine || (user && user.uid === medicine.fulfillerId)) && (
                  <div className="bg-indigo-50 dark:bg-indigo-500/10 border border-indigo-200 dark:border-indigo-500/30 rounded-2xl p-4">

    // --- 5. Main Views (Pages) ---

    function HomeView({ donors = [], user, userProfile, loading, onCopyPhone, isDark, toggleTheme, setView, showNotification, notifications = [], markAsRead, deleteNotification, rejectRequest }) {
      const [filterBlood, setFilterBlood] = useState('الكل');
      const [reportingDonor, setReportingDonor] = useState(null);
      const [modalConfig, setModalConfig] = useState({ isOpen: false });

      const filtered = useMemo(() => {
        let result = (Array.isArray(donors) ? donors : []).filter(d => filterBlood === 'الكل' || d.bloodType === filterBlood);
        return result.sort((a, b) => (b.status !== 0 ? 1 : 0) - (a.status !== 0 ? 1 : 0));
      }, [donors, filterBlood]);

      const handleRate = async (donor) => {
         if (!user) { showNotification('error', 'يجب تسجيل الدخول.'); setView('login'); return; }
         if (user.uid === donor.id) return showNotification('error', 'لا يمكنك تقييم نفسك.');
         const hasRated = (Array.isArray(donor.raters) ? donor.raters : []).includes(user.uid);
         try { await updateDoc(doc(db, DONORS_COLLECTION, donor.id), { raters: hasRated ? arrayRemove(user.uid) : arrayUnion(user.uid) }); showNotification('success', hasRated ? 'تم إلغاء الشكر.' : 'تم الإرسال!'); } catch(e) {}
      };

      const submitReport = async (reason) => {
         try { await addDoc(collection(db, REPORTS_COLLECTION), { reportedDonorId: reportingDonor.id, reportedDonorName: reportingDonor.username, reporterId: user.uid, reason: reason, status: 'pending', createdAt: serverTimestamp() }); showNotification('success', 'تم استلام بلاغك.'); setReportingDonor(null); } catch(e) {}
      };

      const handleSendRequest = (donor, onSuccessCallback) => {
          if (!user) { showNotification('error', 'سجل الدخول أولاً.'); setView('login'); return; }
          if (user.uid === donor.id) return showNotification('error', 'لا يمكنك إرسال طلب لنفسك.');
          setModalConfig({ isOpen: true, title: "تأكيد الطلب", message: `سيتم إرسال إشعار للمتبرع. هل أنت متأكد؟`, isDestructive: false, confirmText: "إرسال", action: async () => {
                 try { await addDoc(collection(db, NOTIFICATIONS_COLLECTION), { toUserId: donor.id, fromUserId: user.uid, fromUserPhone: userProfile?.phone || '', title: "طلب تبرع 🩸", body: `المستخدم ${userProfile?.username || 'مريض'} يحتاج تبرعك. هاتفه: ${userProfile?.phone || ''}`, type: 'request', read: false, createdAt: serverTimestamp() }); showNotification('success', 'تم إرسال الإشعار!'); if (onSuccessCallback) onSuccessCallback(); } catch(e) {}
             }
         });
      };

      return (
        <div className="pb-32 font-sans" dir="rtl">
          <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />
          <div className="px-6 mb-6 mt-4">
            <h2 className="text-lg font-black text-slate-800 dark:text-white mb-3">تصفية حسب الزمرة</h2>
            <div className="flex gap-3 overflow-x-auto pb-4 no-scrollbar direction-rtl" dir="rtl">
              {['الكل', 'A+', 'A-', 'B+', 'B-', 'O+', 'O-', 'AB+', 'AB-'].map(t=><button key={t} onClick={()=>setFilterBlood(t)} className={`flex-shrink-0 h-10 px-6 rounded-full text-sm font-bold border ${filterBlood===t?'bg-brand-accent text-slate-900 border-brand-accent shadow-md':'glass-panel text-slate-500 hover:text-slate-800 dark:hover:text-white'}`}><span dir="ltr">{t}</span></button>)}
            </div>
          </div>
          <div className="px-2 sm:px-6">
            {loading ? <div className="py-20 flex justify-center"><Loader2 className="animate-spin text-emerald-500" size={40}/></div> 
            : filtered.length === 0 ? <EmptyState icon={Droplet} title="لا يوجد متبرعين" desc="كن أول من يتبرع في هذه الفئة!" />
            : filtered.map(d => <DonorCard key={d.id} donor={d} user={user} onCopyPhone={onCopyPhone} onRate={handleRate} onReport={(d) => { if(!user) { setView('login'); showNotification('error', 'سجل دخولك.'); } else { setReportingDonor(d); } }} onSendRequest={handleSendRequest} />)}
          </div>
          <ReportModal isOpen={!!reportingDonor} onClose={() => setReportingDonor(null)} onConfirm={submitReport} donorName={reportingDonor?.username} />
          <CustomModal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} isDestructive={modalConfig.isDestructive} confirmText={modalConfig.confirmText} onCancel={() => setModalConfig({isOpen:false})} onConfirm={() => { modalConfig.action(); setModalConfig({isOpen:false}); }} />
        </div>
      );
    }

    function PharmacyView({ isDark, toggleTheme, pharmacies = [], onCopyPhone, setView, notifications, markAsRead, deleteNotification, rejectRequest, showNotification }) {
      const todayStr = new Date().toISOString().split('T')[0];
      const formattedDate = new Intl.DateTimeFormat('ar-DZ', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).format(new Date());
      const onDutyPharmacies = useMemo(() => (Array.isArray(pharmacies) ? pharmacies : []).filter(p => p.isOnDuty || (Array.isArray(p.dutyDates) && p.dutyDates.includes(todayStr))), [pharmacies, todayStr]);

      return (
        <div className="pb-32 font-sans min-h-screen" dir="rtl">
           <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />
           <div className="px-6 mb-6 mt-4 text-center"><h2 className="text-2xl font-black text-slate-800 dark:text-white mb-1">الصيدليات المناوبة</h2><p className="text-emerald-600 font-bold text-sm">اليوم: {formattedDate}</p></div>
           <div className="px-2 sm:px-6">
            {onDutyPharmacies.length === 0 ? <EmptyState icon={Stethoscope} title="لا توجد صيدليات مناوبة" desc="قد تكون الإدارة لم تقم بتحديث الجدول بعد." />
            : onDutyPharmacies.map(p => <PharmacyCard key={p.id} pharmacy={p} onCopyPhone={onCopyPhone}/>)}
          </div>
        </div>

    }

    function MedicinesView({ user, userProfile, medicines = [], loading, isDark, toggleTheme, setView, showNotification, notifications, markAsRead, deleteNotification, rejectRequest }) {
      const [showAddModal, setShowAddModal] = useState(false); const [medName, setMedName] = useState(''); const [quantity, setQuantity] = useState(''); const [hasPrescription, setHasPrescription] = useState('yes'); const [paymentStatus, setPaymentStatus] = useState('charity'); const [availability, setAvailability] = useState('unavailable'); const [isUrgent, setIsUrgent] = useState(false); const [medDesc, setMedDesc] = useState(''); const [adding, setAdding] = useState(false); const [modalConfig, setModalConfig] = useState({ isOpen: false });
      const visibleMedicines = (Array.isArray(medicines) ? medicines : []).filter(m => m.approved === true || (user && m.requesterId === user.uid));

      const handleAddRequest = async (e) => {
        e.preventDefault(); if (!user) { setView('login'); return; } if(medName.length < 2) return; setAdding(true);
        try { await addDoc(collection(db, MEDICINES_COLLECTION), { medicineName: medName, quantity, hasPrescription, paymentStatus, availability, isUrgent, description: medDesc, requesterId: user.uid, requesterName: userProfile?.username || 'مريض', requesterPhone: userProfile?.phone || '', status: 'pending', fulfillerId: null, approved: false, createdAt: serverTimestamp() }); showNotification('success', 'تمت الإضافة بنجاح.'); setShowAddModal(false); setMedName(''); setQuantity(''); setIsUrgent(false); setMedDesc(''); } catch(err) {} finally { setAdding(false); }
      };

      const handleComplete = (id) => setModalConfig({ isOpen: true, title: "تأكيد التسليم", message: "تم التسليم بنجاح؟", isDestructive: false, confirmText: "تم ✅", action: async () => { try { await updateDoc(doc(db, MEDICINES_COLLECTION, id), { status: 'completed' }); showNotification('success', 'الحمد لله.'); } catch(e) {} } });
      const handleDelete = (id) => setModalConfig({ isOpen: true, title: "حذف الطلب", message: "متأكد من الحذف؟", isDestructive: true, confirmText: "حذف", action: async () => { try { await deleteDoc(doc(db, MEDICINES_COLLECTION, id)); showNotification('success', 'تم الحذف.'); } catch(e) {} } });

      return (
        <div className="pb-32 font-sans min-h-screen relative" dir="rtl">
           <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />
           <div className="px-6 mb-6 flex justify-between items-end mt-4">
              <div><h2 className="text-2xl font-black text-slate-800 dark:text-white mb-1">الأدوية المفقودة</h2><p className="text-slate-500 text-sm">منصة لتوفير الأدوية</p></div>

           </div>
           <div className="px-2 sm:px-6 mt-6">
            {loading ? <div className="py-20 flex justify-center"><Loader2 className="animate-spin text-emerald-500" size={40}/></div>

                     <select className="custom-input custom-select w-full h-12 px-4 rounded-xl text-right" value={paymentStatus} onChange={e => setPaymentStatus(e.target.value)}><option value="buy">نعم، سأدفع ثمنه</option><option value="charity">أحتاجه كصدقة (عاجز عن الدفع)</option></select>

                     <div className="bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 p-3 rounded-xl"><label className="flex items-center gap-3 cursor-pointer"><input type="checkbox" checked={isUrgent} onChange={e => setIsUrgent(e.target.checked)} className="w-5 h-5 accent-red-500 rounded cursor-pointer" /><span className="font-bold text-red-600 dark:text-red-400 text-sm">هذا الدواء لحالة مستعجلة جداً 🚨</span></label></div>

          <CustomModal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} isDestructive={modalConfig.isDestructive} confirmText={modalConfig.confirmText} onCancel={()=>setModalConfig({isOpen:false})} onConfirm={()=>{modalConfig.action();setModalConfig({isOpen:false});}} />
        </div>
      )
    }

    function DoctorsView({ isDark, toggleTheme, setView, notifications, markAsRead, deleteNotification, rejectRequest, showNotification }) {
      return (
        <div className="pb-32 font-sans min-h-screen" dir="rtl">
           <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification}/>
           <div className="px-6 mb-6 mt-4 text-center"><h2 className="text-2xl font-black text-slate-800 dark:text-white mb-1">دليل الأطباء</h2></div>
           <div className="px-2 sm:px-6"><EmptyState icon={HeartPulse} title="قريباً إن شاء الله" desc="سيتم توفير دليل شامل لأطباء المنطقة." /></div>

      const handleLogin = async (e) => {
        e.preventDefault(); setLoading(true);

          <div className="w-full max-w-md">

            <h2 className="text-3xl font-black text-slate-800 dark:text-white text-center mb-6">مرحباً بعودتك!</h2>
            <form onSubmit={handleLogin} className="space-y-4">

              <input type="password" placeholder="كلمة المرور" className="custom-input w-full h-14 px-4 rounded-full text-center" onChange={e => setPassword(e.target.value)} required />
              <button type="button" onClick={() => setShowForgot(true)} className="w-full text-sm font-bold text-emerald-600 mt-2">نسيت كلمة المرور؟</button>
              <button type="submit" disabled={loading} className="w-full h-14 bg-brand-accent text-slate-900 rounded-full font-black text-lg mt-4 flex items-center justify-center">{loading ? <Loader2 className="animate-spin text-slate-900"/> : 'تسجيل الدخول'}</button>
            </form>
            <div className="mt-8 text-center"><button onClick={() => setView('register')} className="text-slate-500 font-bold">ليس لديك حساب؟ <span className="text-emerald-600">إنشاء حساب</span></button></div>

    function RegisterView({ setView, showNotification }) {
      const [formData, setFormData] = useState({ username: '', email: '', password: '', phone: '', neighborhood: '', municipality: 'الأمير عبد القادر', bloodType: 'A+' });
      const [isPhoneHidden, setIsPhoneHidden] = useState(false); const [acceptTerms, setAcceptTerms] = useState(false); const [showTerms, setShowTerms] = useState(false); const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault(); if (!acceptTerms) return showNotification('error', 'يجب الموافقة على الشروط أولاً.'); if (formData.phone.length < 10) return showNotification('error', 'رقم الهاتف قصير جداً'); setLoading(true);
        try { const cred = await createUserWithEmailAndPassword(auth, formData.email.trim(), formData.password); await setDoc(doc(db, DONORS_COLLECTION, cred.user.uid), { uid: cred.user.uid, ...formData, status: 1, raters: [], isPhoneHidden: isPhoneHidden, createdAt: serverTimestamp(), lastDonationDate: null }); showNotification('success', 'تم إنشاء الحساب!'); setView('profile'); } 
        catch (err) { showNotification('error', 'فشل التسجيل. تأكد من البيانات.'); setLoading(false); }
      };

      return (
        <div className="min-h-screen p-4 sm:p-6 flex flex-col justify-center font-sans pb-24" dir="rtl">
           <div className="glass-panel rounded-[2.5rem] p-6 sm:p-8 shadow-2xl relative max-w-md mx-auto w-full">
              <button onClick={() => setView('home')} className="absolute top-6 left-6 text-slate-400 font-bold flex items-center gap-1 text-sm hover:text-emerald-500"><ArrowRight size={16}/> إغلاق</button>
              <h2 className="text-2xl font-black text-emerald-600 mb-6 text-center mt-4">انضم للمتبرعين</h2>
              <form onSubmit={handleSubmit} className="space-y-4">
                 <input placeholder="الاسم المستعار (سيظهر للجميع)" className="custom-input h-12 rounded-xl px-4 w-full" onChange={e => setFormData({...formData, username: e.target.value})} required/>
                 <div className="grid grid-cols-2 gap-3"><input value="بلدية الأمير عبد القادر" disabled className="custom-input h-12 rounded-xl px-4 opacity-70 cursor-not-allowed bg-slate-100 dark:bg-slate-900/50 text-xs sm:text-sm font-bold" /><input placeholder="الحي / الدوار" className="custom-input h-12 rounded-xl px-4 w-full" onChange={e => setFormData({...formData, neighborhood: e.target.value})} required/></div>
                 <input type="email" placeholder="البريد الإلكتروني" className="custom-input h-12 rounded-xl px-4 w-full" onChange={e => setFormData({...formData, email: e.target.value})} required/>
                 <input type="password" placeholder="كلمة المرور (+6 حروف)" minLength={6} className="custom-input h-12 rounded-xl px-4 w-full" onChange={e => setFormData({...formData, password: e.target.value})} required/>
                 <div className="flex gap-2"><input type="tel" placeholder="رقم الهاتف" className="custom-input h-12 rounded-xl px-4 flex-1 text-right" onChange={e => setFormData({...formData, phone: e.target.value})} dir="ltr" required/><button type="button" onClick={() => setIsPhoneHidden(!isPhoneHidden)} className={`h-12 px-4 rounded-xl flex items-center justify-center border ${isPhoneHidden ? 'bg-indigo-50 border-indigo-200 text-indigo-600 dark:bg-indigo-500/20' : 'bg-slate-50 border-slate-200 text-slate-500 dark:bg-slate-800'}`} title={isPhoneHidden ? 'الرقم مخفي' : 'الرقم ظاهر'}>{isPhoneHidden ? <EyeOffIcon size={20}/> : <Eye size={20}/>}</button></div>
                 <select className="custom-input custom-select h-12 rounded-xl px-4 w-full text-center font-bold text-lg" onChange={e => setFormData({...formData, bloodType: e.target.value})}>{['A+', 'O+', 'B+', 'AB+', 'A-', 'O-', 'B-', 'AB-'].map(t=><option key={t} value={t}>{t}</option>)}</select>
                 <div className="flex items-start gap-3 p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 mt-4"><input type="checkbox" id="tos" checked={acceptTerms} onChange={(e) => setAcceptTerms(e.target.checked)} className="mt-1 w-5 h-5 accent-emerald-500 rounded cursor-pointer shrink-0" /><label htmlFor="tos" className="text-xs font-bold text-slate-600 dark:text-slate-300">أوافق على <button type="button" onClick={() => setShowTerms(true)} className="text-emerald-600 underline">شروط الاستخدام وإخلاء المسؤولية</button></label></div>
                 <button type="submit" disabled={loading || !acceptTerms} className="w-full h-14 bg-brand-accent text-slate-900 rounded-2xl font-black shadow-lg mt-6 flex justify-center items-center disabled:opacity-50">{loading ? <Loader2 className="animate-spin"/> : 'تسجيل وانضمام'}</button>
              </form>
           </div>
           <BaseModal isOpen={showTerms} onClose={() => setShowTerms(false)}><h2 className="text-xl font-black text-emerald-600 mb-4">شروط الاستخدام وإخلاء المسؤولية</h2><div className="text-xs text-slate-600 dark:text-slate-300 space-y-3 text-right leading-relaxed pr-2"><h3 className="font-bold text-slate-800 dark:text-white">1. طبيعة الخدمة:</h3><p>هذا التطبيق هو منصة تقنية تهدف للربط الإنساني والتطوعي بين المتبرعين بالدم والمحتاجين إليه. التطبيق ليس جهة طبية ولا يقوم بجمع الدم أو تخزينه، ولا يغني عن الإجراءات الرسمية المتبعة في مراكز حقن الدم والمستشفيات التابعة لوزارة الصحة.</p><h3 className="font-bold text-slate-800 dark:text-white mt-4">2. حماية المعطيات الشخصية:</h3><p>التزاماً بالقانون 18-07 المتعلق بحماية المعطيات الشخصية، نؤكد أن البيانات المدخلة (رقم الهاتف، الفصيلة) تُستخدم حصراً لغرض التنسيق للتبرع.</p><p>للمستخدم الحق الكامل في استخدام اسم مستعار، كما يملك الحق في إخفاء رقم هاتفه أو حذف حسابه نهائياً في أي وقت، وهو ما سيؤدي لمسح بياناته من قاعدة بياناتنا فوراً.</p><h3 className="font-bold text-slate-800 dark:text-white mt-4">3. إخلاء المسؤولية:</h3><ul className="list-disc pr-4 space-y-1"><li>المطور غير مسؤول عن دقة البيانات التي يضعها المستخدمون (مثل فصيلة الدم)، ويجب على الجهة الطبية المستقبلة للمتبرع إجراء التحاليل اللازمة للتأكد.</li><li>المطور غير مسؤول عن أي سوء استخدام لبيانات التواصل (رقم الهاتف) خارج إطار هذا التطبيق.</li><li>يُمنع منعاً باتاً طلب أي مقابل مادي مقابل التبرع، والتطبيق مخصص للعمل التطوعي المجاني فقط. أي بلاغ عن محاولة بيع أو شراء دم سيؤدي لحظر الحساب نهائياً والتبليغ عنه لدى السلطات المعنية.</li></ul><h3 className="font-bold text-slate-800 dark:text-white mt-4">4. الموافقة:</h3><p>بقيامك بالتسجيل في التطبيق، أنت تقر بقرائتك لهذه الشروط وتوافق على مشاركة فصيلة دمك ومعلومات التواصل الخاصة بك مع المستخدمين الآخرين لغرض التبرع.</p></div><button onClick={() => { setAcceptTerms(true); setShowTerms(false); }} className="w-full mt-6 h-12 bg-emerald-500 text-white rounded-xl font-bold hover:bg-emerald-600 transition">موافق</button></BaseModal>
        </div>

    // هنا تكمن الإضافة البصرية الجميلة لأزرار التحكم
    function ProfileView({ user, donorData, showNotification, isDark, toggleTheme, setView, notifications, markAsRead, deleteNotification, rejectRequest }) {
      const [loading, setLoading] = useState(false); const [modalConfig, setModalConfig] = useState({ isOpen: false });
      
      const closeModal = () => setModalConfig({ ...modalConfig, isOpen: false });
      const handleLogout = () => setModalConfig({ isOpen: true, title: "خروج", message: "متأكد من تسجيل الخروج؟", isDestructive: true, confirmText: "خروج", action: async () => { await signOut(auth); window.location.reload(); } });
      
      if (!donorData) return <div className="min-h-screen flex justify-center items-center"><Loader2 className="animate-spin text-emerald-500" size={40}/></div>;

      const isAvailable = donorData.status !== 0;
      let isEligibleToDonate = true; let daysRemaining = 0;

      if (donorData.lastDonationDate) {
        const nextDonationDate = new Date(donorData.lastDonationDate.toDate().getTime() + (COOLDOWN_DAYS * 24 * 60 * 60 * 1000));
        if (new Date() < nextDonationDate) { isEligibleToDonate = false; daysRemaining = Math.ceil(Math.abs(nextDonationDate - new Date()) / (1000 * 60 * 60 * 24)); }
      }

      const toggleStatus = async () => {
        if (!isEligibleToDonate) return showNotification('error', `متبقي ${daysRemaining} يوماً لانتهاء فترة النقاهة.`);
        setLoading(true); try { await setDoc(doc(db, DONORS_COLLECTION, user.uid), { status: donorData.status !== 0 ? 0 : 1 }, { merge: true }); showNotification('success', 'تم التحديث بنجاح'); } catch (e) {} finally { setLoading(false); }
      };

      const togglePhoneVisibility = async () => {
        setLoading(true); try { await setDoc(doc(db, DONORS_COLLECTION, user.uid), { isPhoneHidden: !donorData.isPhoneHidden }, { merge: true }); showNotification('success', 'تم تحديث خصوصية الهاتف'); } catch (e) {} finally { setLoading(false); }
      };

      const handleDonatedToday = () => setModalConfig({ isOpen: true, title: "تأكيد التبرع", message: "سيتم إخفاء رقمك وحسابك تلقائياً لـ 3 أشهر للراحة.", isDestructive: false, confirmText: "تأكيد وبدء النقاهة", action: async () => { setLoading(true); try { await setDoc(doc(db, DONORS_COLLECTION, user.uid), { lastDonationDate: serverTimestamp(), status: 0 }, { merge: true }); showNotification('success', 'تم بدء النقاهة.'); } catch (e) {} finally { setLoading(false); } } });

      return (
        <div className="pb-32 font-sans" dir="rtl">
          <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />
          <div className="px-6">
            <div className="flex flex-col items-center mb-6 animate-fadeIn">
               <div className="w-24 h-24 rounded-full glass-panel flex items-center justify-center mb-4 relative shadow-sm border-2 border-slate-100 dark:border-slate-800">
                   <User size={40} className={isAvailable && isEligibleToDonate ? "text-emerald-500 dark:text-brand-accent" : "text-slate-400"}/>
                   <div className={`absolute bottom-1 right-1 w-5 h-5 rounded-full border-2 border-white dark:border-slate-900 ${isAvailable && isEligibleToDonate ? 'bg-emerald-500 dark:bg-brand-accent shadow-[0_0_8px_#CDEB57]' : 'bg-slate-400'}`}></div>
               </div>
               <h2 className="text-2xl font-black text-slate-800 dark:text-white mb-2">{donorData.username}</h2>
               <div className="flex items-center gap-2 bg-slate-100 dark:bg-slate-800/50 px-4 py-1.5 rounded-full text-sm font-bold text-slate-600 dark:text-slate-400" dir="ltr">{donorData.phone}</div>
            </div>

            {!isEligibleToDonate && <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-500/30 rounded-2xl p-4 mb-4 text-center animate-fadeIn"><CalendarClock size={28} className="text-blue-500 mx-auto mb-2" /><h4 className="font-bold text-blue-700 dark:text-blue-400">فترة نقاهة صحية</h4><div className="bg-white dark:bg-slate-900/50 py-2 rounded-xl text-blue-800 dark:text-blue-300 font-black mt-2">متبقي {daysRemaining} يوماً</div></div>}

            <div className="flex gap-4 mb-4">
                {/* Switch 1: Status */}
                <div onClick={!loading && isEligibleToDonate ? toggleStatus : undefined} className={`flex-1 relative overflow-hidden glass-panel text-center p-5 rounded-3xl transition-all duration-300 ${isEligibleToDonate ? 'cursor-pointer active:scale-95' : 'opacity-50 grayscale'}`}>
                   <div className={`absolute top-0 left-0 w-full h-1.5 transition-colors duration-300 ${isAvailable ? 'bg-emerald-500 shadow-[0_0_15px_#10b981]' : 'bg-slate-300 dark:bg-slate-700'}`}></div>
                   <h3 className="font-bold mb-3 text-sm text-slate-800 dark:text-white">{isAvailable ? 'حسابي متاح' : 'حسابي مخفي'}</h3>
                   <div className={`w-12 h-6 mx-auto rounded-full p-1 flex items-center transition-colors duration-300 ${isAvailable ? 'bg-emerald-500' : 'bg-slate-300 dark:bg-slate-700'}`}>
                       <div className={`w-4 h-4 bg-white rounded-full shadow-sm transition-transform duration-300 transform ${isAvailable ? '-translate-x-6' : 'translate-x-0'}`}></div>
                   </div>
                </div>

                {/* Switch 2: Phone Visibility */}
                <div onClick={!loading ? togglePhoneVisibility : undefined} className="flex-1 relative overflow-hidden glass-panel text-center p-5 rounded-3xl cursor-pointer active:scale-95 transition-all duration-300">
                   <div className={`absolute top-0 left-0 w-full h-1.5 transition-colors duration-300 ${!donorData.isPhoneHidden ? 'bg-indigo-500 shadow-[0_0_15px_#6366f1]' : 'bg-slate-300 dark:bg-slate-700'}`}></div>
                   <h3 className="font-bold mb-3 text-sm text-slate-800 dark:text-white">{!donorData.isPhoneHidden ? 'رقمي ظاهر' : 'رقمي مخفي'}</h3>
                   <div className={`w-12 h-6 mx-auto rounded-full p-1 flex items-center transition-colors duration-300 ${!donorData.isPhoneHidden ? 'bg-indigo-500' : 'bg-slate-300 dark:bg-slate-700'}`}>
                       <div className={`w-4 h-4 bg-white rounded-full shadow-sm transition-transform duration-300 transform ${!donorData.isPhoneHidden ? '-translate-x-6' : 'translate-x-0'}`}></div>
                   </div>
                </div>
            </div>

            {isEligibleToDonate && <button onClick={handleDonatedToday} className="w-full mt-2 bg-white dark:bg-slate-900 border-2 border-emerald-500 dark:border-brand-accent text-emerald-600 dark:text-brand-accent py-4 rounded-[2rem] font-bold flex justify-center items-center gap-2 active:scale-95 transition-transform"><ShieldCheck size={22} /> تبرعت اليوم</button>}
            <div className="mt-8 text-center"><button onClick={handleLogout} className="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white font-bold flex justify-center items-center gap-2 w-full py-4 glass-panel rounded-2xl transition-colors"><LogOut size={16} /> تسجيل الخروج</button></div>
          </div>
          <CustomModal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} isDestructive={modalConfig.isDestructive} confirmText={modalConfig.confirmText} onCancel={closeModal} onConfirm={() => { modalConfig.action(); closeModal(); }} />
        </div>
      );
    }

    // --- 6. Main App Component ---

    function App() {
      const [user, setUser] = useState(null); const [userProfile, setUserProfile] = useState(null);
      const [donors, setDonors] = useState([]); const [medicines, setMedicines] = useState([]); const [pharmacies, setPharmacies] = useState([]); const [notifications, setNotifications] = useState([]); 
      const [view, setView] = useState('home'); const [loading, setLoading] = useState(true); const [loadingMed, setLoadingMed] = useState(true); const [notification, setNotification] = useState(null); const [initializing, setInitializing] = useState(true);
      const [modalConfig, setModalConfig] = useState({ isOpen: false });
      
      const [isDark, setIsDark] = useState(() => localStorage.getItem('theme') === 'dark');

      useEffect(() => { if (isDark) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); } }, [isDark]);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          if (u) {
            setUser(u);
            onSnapshot(doc(db, DONORS_COLLECTION, u.uid), (d) => { if (d.exists()) setUserProfile({ id: d.id, ...d.data() }); if (initializing) setInitializing(false); }, () => setInitializing(false));
            onSnapshot(query(collection(db, NOTIFICATIONS_COLLECTION), orderBy('createdAt', 'desc')), (s) => setNotifications(s.docs.map(d => ({ id: d.id, ...d.data() })).filter(n => n.toUserId === u.uid)));
          } else { setUser(null); setUserProfile(null); setNotifications([]); if(view === 'profile') setView('home'); setInitializing(false); }
        });
        return () => unsubscribe();
      }, [initializing, view]); 

      useEffect(() => {
        const unsubDonors = onSnapshot(query(collection(db, DONORS_COLLECTION), orderBy('createdAt', 'desc')), (s) => { setDonors(s.docs.map(d => ({ id: d.id, ...d.data() }))); setLoading(false); });
        const unsubMedicines = onSnapshot(query(collection(db, MEDICINES_COLLECTION), orderBy('createdAt', 'desc')), (s) => { setMedicines(s.docs.map(d => ({ id: d.id, ...d.data() }))); setLoadingMed(false); });
        const unsubPharmacies = onSnapshot(query(collection(db, PHARMACIES_COLLECTION), orderBy('createdAt', 'desc')), (s) => setPharmacies(s.docs.map(d => ({ id: d.id, ...d.data() }))));
        return () => { unsubDonors(); unsubMedicines(); unsubPharmacies(); };
      }, []);

      const showNotification = (type, msg) => { setNotification({ type, msg }); setTimeout(() => setNotification(null), 3500); };
      const handleCopy = (phone) => { navigator.clipboard.writeText(phone); showNotification('success', 'تم النسخ'); };
      const toggleTheme = () => setIsDark(!isDark);
      const markAsRead = async (id) => { try { await updateDoc(doc(db, NOTIFICATIONS_COLLECTION, id), { read: true }); } catch(e){} };
      const deleteNotification = async (id) => { try { await deleteDoc(doc(db, NOTIFICATIONS_COLLECTION, id)); } catch(e){} };

      const rejectRequest = async (notif) => {
          if (!user || !userProfile) return;
          try {
              await addDoc(collection(db, NOTIFICATIONS_COLLECTION), { toUserId: notif.fromUserId, fromUserId: user.uid, title: "اعتذار عن التبرع 😔", body: `نعتذر، المتبرع "${userProfile.username}" غير متاح للتبرع في الوقت الحالي.\nنسأل الله العظيم أن يشفي مريضكم.`, type: 'info', read: false, createdAt: serverTimestamp() });
              await deleteDoc(doc(db, NOTIFICATIONS_COLLECTION, notif.id));
              showNotification('success', 'تم إرسال الاعتذار.');
          } catch(e) {}
      };

      if (initializing) return <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950"><Loader2 className="animate-spin text-emerald-500" size={48}/></div>;

      return (
        <div className="min-h-screen relative">
          {view === 'home' && <HomeView donors={donors} user={user} userProfile={userProfile} loading={loading} onCopyPhone={handleCopy} isDark={isDark} toggleTheme={toggleTheme} setView={setView} showNotification={showNotification} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} />}
          {view === 'pharmacy' && <PharmacyView pharmacies={pharmacies} onCopyPhone={handleCopy} isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />}
          {view === 'medicines' && <MedicinesView user={user} userProfile={userProfile} medicines={medicines} loading={loadingMed} isDark={isDark} toggleTheme={toggleTheme} setView={setView} showNotification={showNotification} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} />}
          {view === 'doctors' && <DoctorsView isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />}
          {view === 'login' && <LoginView setView={setView} showNotification={showNotification} />}
          {view === 'register' && <RegisterView setView={setView} showNotification={showNotification} />}
          {view === 'profile' && <ProfileView user={user} donorData={userProfile} showNotification={showNotification} isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} />}
          
          <BottomNav view={view} setView={setView} user={user} />
          <Toast notification={notification} />
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
