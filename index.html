  <!-- ========== PWA Icon Generator + Manifest ========== -->
  <script>
    (function() {
      // Icon sizes needed for PWA
      const ICON_SIZES = [72, 96, 128, 144, 152, 167, 180, 192, 384, 512];
      const SPLASH_SIZE = { w: 1125, h: 2436 };
      const iconDataUrls = {};

      // Draw the Zomraa icon on canvas
      function drawIcon(canvas, size) {
        const ctx = canvas.getContext('2d');
        const s = size;
        canvas.width = s;
        canvas.height = s;

        // Clear
        ctx.clearRect(0, 0, s, s);

        // Rounded rect background with gradient
        const radius = s * 0.22;
        const grad = ctx.createLinearGradient(0, 0, s, s);
        grad.addColorStop(0, '#10b981');
        grad.addColorStop(1, '#CDEB57');

        ctx.beginPath();
        ctx.moveTo(radius, 0);
        ctx.lineTo(s - radius, 0);
        ctx.quadraticCurveTo(s, 0, s, radius);
        ctx.lineTo(s, s - radius);
        ctx.quadraticCurveTo(s, s, s - radius, s);
        ctx.lineTo(radius, s);
        ctx.quadraticCurveTo(0, s, 0, s - radius);
        ctx.lineTo(0, radius);
        ctx.quadraticCurveTo(0, 0, radius, 0);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // Heart shape
        const cx = s / 2;
        const cy = s * 0.42;
        const hs = s * 0.38;

        function drawHeart(x, y, size) {
          ctx.beginPath();
          const topCurveHeight = size * 0.3;
          ctx.moveTo(x, y + topCurveHeight);
          // Left curve
          ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + topCurveHeight);
          // Left to bottom
          ctx.bezierCurveTo(x - size / 2, y + (size + topCurveHeight) / 2, x, y + (size + topCurveHeight) / 1.3, x, y + size);
          // Right to bottom
          ctx.bezierCurveTo(x, y + (size + topCurveHeight) / 1.3, x + size / 2, y + (size + topCurveHeight) / 2, x + size / 2, y + topCurveHeight);
          // Right curve back
          ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + topCurveHeight);
          ctx.closePath();
        }

        // Draw heart with white fill
        drawHeart(cx, cy, hs);
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.fill();

        // Blood drop inside heart
        const dropCx = cx;
        const dropCy = cy + hs * 0.23;
        const dropSize = hs * 0.35;
        
        ctx.beginPath();
        // Teardrop shape
        const dropTop = dropCy - dropSize;
        ctx.arc(dropCx, dropCy, dropSize * 0.5, 0, Math.PI * 2);
        ctx.moveTo(dropCx - dropSize * 0.4, dropTop + dropSize * 0.1);
        ctx.quadraticCurveTo(dropCx, dropTop - dropSize * 0.6, dropCx + dropSize * 0.4, dropTop + dropSize * 0.1);
        ctx.fillStyle = '#ef4444';
        ctx.fill();

        return canvas;
      }

      // Draw splash screen
      function drawSplash(canvas, w, h) {
        const ctx = canvas.getContext('2d');
        canvas.width = w;
        canvas.height = h;

        // Background
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#10b981');
        grad.addColorStop(1, '#047857');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        // Center icon
        const iconSize = w * 0.25;
        const iconCanvas = document.createElement('canvas');
        drawIcon(iconCanvas, iconSize);
        ctx.drawImage(iconCanvas, w / 2 - iconSize / 2, h * 0.32, iconSize, iconSize);

        // App name
        ctx.fillStyle = 'white';
        ctx.font = `bold ${w * 0.11}px Cairo, sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText('Zomraa', w / 2, h * 0.55);

        // Subtitle
        ctx.font = `${w * 0.04}px Cairo, sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.fillText('قطرة حياة', w / 2, h * 0.61);

        // Loading dots
        ctx.font = `${w * 0.05}px sans-serif`;
        ctx.fillText('•••', w / 2, h * 0.72);

        return canvas;
      }

      // Generate all icons
      function generateAllIcons() {
        ICON_SIZES.forEach(size => {
          const canvas = document.createElement('canvas');
          drawIcon(canvas, size);
          iconDataUrls[size] = canvas.toDataURL('image/png');
        });

        // Generate splash
        const splashCanvas = document.createElement('canvas');
        drawSplash(splashCanvas, SPLASH_SIZE.w, SPLASH_SIZE.h);
        iconDataUrls['splash'] = splashCanvas.toDataURL('image/png');

        return iconDataUrls;
      }

      // Create and set manifest
      function createManifest(icons) {
        const manifestIcons = ICON_SIZES.map(size => ({
          src: icons[size],
          sizes: `${size}x${size}`,
          type: 'image/png',
          purpose: (size === 192 || size === 512) ? 'any maskable' : 'any'
        }));

        const manifest = {
          name: 'Zomraa - قطرة حياة',
          short_name: 'Zomraa',
          description: 'تطبيق خيري وطبي متكامل يربط المتبرعين بالمحتاجين',
          start_url: '/',
          scope: '/',
          display: 'standalone',
          orientation: 'portrait-primary',
          background_color: '#F8FAFC',
          theme_color: '#CDEB57',
          lang: 'ar',
          dir: 'rtl',
          icons: manifestIcons,
          categories: ['medical', 'health', 'social'],
          prefer_related_applications: false
        };

        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const manifestUrl = URL.createObjectURL(blob);

        // Create manifest link
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestUrl;
        document.head.appendChild(link);

        return manifestUrl;
      }

      // Set Apple touch icons
      function setAppleIcons(icons) {
        const sizes = [152, 167, 180];
        sizes.forEach(size => {
          if (icons[size]) {
            let link = document.querySelector(`link[rel="apple-touch-icon"][sizes="${size}x${size}"]`);
            if (!link) {
              link = document.createElement('link');
              link.rel = 'apple-touch-icon';
              link.setAttribute('sizes', `${size}x${size}`);
              document.head.appendChild(link);
            }
            link.href = icons[size];
          }
        });

        // Default apple-touch-icon (152)
        let defaultLink = document.querySelector('link[rel="apple-touch-icon"]:not([sizes])');
        if (!defaultLink && icons[152]) {
          defaultLink = document.createElement('link');
          defaultLink.rel = 'apple-touch-icon';
          document.head.appendChild(defaultLink);
        }
        if (defaultLink && icons[152]) {
          defaultLink.href = icons[152];
        }

        // Splash screen
        if (icons['splash']) {
          let splash = document.querySelector('link[rel="apple-touch-startup-image"]');
          if (!splash) {
            splash = document.createElement('link');
            splash.rel = 'apple-touch-startup-image';
            splash.setAttribute('media', '(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)');
            document.head.appendChild(splash);
          }
          splash.href = icons['splash'];
        }
      }

      // Update favicon
      function setFavicon(icons) {
        if (icons[72]) {
          const favicon = document.getElementById('dynamic-favicon');
          if (favicon) favicon.href = icons[72];
        }
      }

      // Run generation
      try {
        const icons = generateAllIcons();
        createManifest(icons);
        setAppleIcons(icons);
        setFavicon(icons);
        // Store globally for SW use
        window.__PWA_ICONS = icons;
        console.log('[PWA] ✅ All icons generated automatically (single file)');
      } catch (e) {
        console.warn('[PWA] Icon generation failed, using fallback:', e);
      }
    })();
  </script>

function AppHeader({isDark,toggleTheme,setView,notifications,markAsRead,deleteNotification,rejectRequest,showNotification,user,userProfile}){
  const [showAbout,setShowAbout]=useState(false); 
  const [showNotifs,setShowNotifs]=useState(false);
  const safe=Array.isArray(notifications)?notifications:[];
  const unread=safe.filter(n=>!n.read).length;
  const [isInstalled, setIsInstalled] = useState(false);
  
  // التحقق إذا كان التطبيق مثبتاً مسبقاً
  useEffect(() => {
    const checkInstalled = () => {
      const standalone = window.matchMedia('(display-mode: standalone)').matches;
      const iosStandalone = window.navigator.standalone === true;
      setIsInstalled(standalone || iosStandalone);
    };
    checkInstalled();
    window.addEventListener('appinstalled', () => setIsInstalled(true));
    const mediaQuery = window.matchMedia('(display-mode: standalone)');
    mediaQuery.addEventListener('change', checkInstalled);
    return () => {
      window.removeEventListener('appinstalled', () => setIsInstalled(true));
      mediaQuery.removeEventListener('change', checkInstalled);
    };
  }, []);
  
  // عند الضغط على زر التثبيت
  const triggerInstall = () => {
    // إذا كان there's a native install prompt
    if (window._deferredPWAInstall) {
      window._deferredPWAInstall.prompt();
      window._deferredPWAInstall.userChoice.then((result) => {
        console.log('[PWA] User choice:', result.outcome);
        window._deferredPWAInstall = null;
      });
      return;
    }
    
    // iOS: إظهار التعليمات
    const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    if (isIOS) {
      alert('لتثبيت التطبيق:\n\n1️⃣ اضغط على زر المشاركة 📤 في المتصفح\n2️⃣ اختر "إضافة إلى الشاشة الرئيسية"\n3️⃣ اضغط "إضافة"');
      return;
    }
    
    // Android/Desktop: إظهار النافذة المنبثقة

    if (banner) {
      banner.style.display = 'block';
    }
  };
  
  return (<>
    <div className="sticky top-0 z-40 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-b px-4 py-4 flex justify-between items-center mb-6 shadow-sm">

            title="تثبيت التطبيق على الشاشة الرئيسية"

            <Download size={20}/>
          </button>

own} className={`w-full flex items-center justify-center gap-2 py-2 rounded-xl text-sm font-bold ${cooldown?'bg-emerald-50 text-emerald-600':'bg-indigo-50 text-indigo-700 hover:bg-indigo-100'}`}>{cooldown?<CheckCircle2 size={16}/>:<Bell size={16}/>}{cooldown?'تم إرسال الإشعار':isHidden?'إرسال طلب، الرقم مخفي':'إرسال طلب تبرع'}</button>{!isHidden&&fullPhone&&(<div className="flex items-center justify-end gap-2 w-full"><button onClick={()=>onCopyPhone(fullPhone)} className="flex-1 flex items-center justify-center gap-2 bg-slate-50 border py-2 px-3 rounded-xl text-sm font-bold text-slate-600"><Copy size={14}/><span dir="ltr" className="truncate">{fullPhone}</span></button><a href={`tel:${fullPhone}`} className="bg-brand-accent text-slate-900 p-2 rounded-xl"><Phone size={18} fill="currentColor"/></a></div>)}</div></>):(<div className="w-full text-xs font-bold text-slate-400 flex items-center justify-center gap-1 bg-slate-50 py-2 rounded-xl"><Plane size={14}/> غير متاح / نقاهة</div>)}</div></div>);

ems-center justify-center gap-2 bg-emerald-500 text-white py-3 px-4 rounded-xl text-sm font-black"><span dir="ltr">{fullPhone}</span><Phone size={18} fill="currentColor"/></a></>):<div className="flex-1 text-center text-slate-400 py-3 bg-slate-100 rounded-xl text-sm">رقم غير متوفر</div>}</div></div>);
    }

    // DoctorCard
    function DoctorCard({doctor,user,setView,showNotification,onCopyPhone}){
      if(!doctor) return null;
      const ratings=doctor?.ratings&&typeof doctor.ratings==='object'?doctor.ratings:{};
      const {average,count}=getAverageDoctorRating(doctor);
      const myRating=user?Number(ratings[user.uid]||0):0;
      const fullPhone=getSafePhone(doctor.phone);
      const hasMapLink=doctor.mapLink&&doctor.mapLink.trim()!=='';
      const handleRate=async(value)=>{ if(!user){ showNotification('error','سجل دخولك للتقييم'); setView('login'); return; } try{ await setDoc(doc(db,DOCTORS_COLLECTION,doctor.id),{ratings:{[user.uid]:value}},{merge:true}); showNotification('success','تم تقييم الطبيب'); }catch{ showNotification('error','فشل التقييم'); } };

})</span></p></div><div className="flex items-center gap-1">{[1,2,3,4,5].map(v=><button key={v} onClick={()=>handleRate(v)} className={`transition ${v<=(myRating||Math.round(average))?'text-yellow-400':'text-slate-300'}`}><Star size={22} fill="currentColor"/></button>)}</div></div><div className="flex items-center gap-2 w-full">{hasMapLink&&<a href={doctor.mapLink} target="_blank" className="p-3 bg-blue-50 text-blue-600 rounded-xl"><Map size={20}/></a>}{fullPhone?(<><button onClick={()=>onCopyPhone(fullPhone)} className="p-3 bg-slate-50 text-slate-500 rounded-xl"><Copy size={20}/></button><a href={`tel:${fullPhone}`} className="flex-1 flex items-center justify-center gap-2 bg-emerald-500 text-white py-3 px-4 rounded-xl text-sm font-black"><span dir="ltr">{fullPhone}</span><Phone size={18} fill="currentColor"/></a></>):<div className="flex-1 text-center text-slate-400 py-3 bg-slate-100 rounded-xl text-sm">رقم غير متوفر</div>}</div></div></div>);
    }

    // MedicineCard
    function MedicineCard({medicine,user,userProfile,onFulfill,onCancelFulfill,onComplete,onDelete,showNotification}){
      const [showDetails,setShowDetails]=useState(false);
      if(!medicine) return null;
      const isPending=medicine.status==='pending'; const isInProgress=medicine.status==='in_progress'; const isCompleted=medicine.status==='completed';
      const isMine=user&&user.uid===medicine.requesterId; const amIFulfiller=user&&user.uid===medicine.fulfillerId;
      const dateStr=medicine.createdAt?.toDate?new Intl.DateTimeFormat('ar-DZ',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}).format(medicine.createdAt.toDate()):'الآن';
      let targetPhone='',targetName='',targetRole='';
      if(isInProgress&&isMine){targetPhone=getSafePhone(medicine.fulfillerPhone);targetName=medicine.fulfillerName||'فاعل خير';targetRole='المتبرع';}
      else if(isInProgress&&amIFulfiller){targetPhone=getSafePhone(medicine.requesterPhone);targetName=medicine.requesterName||'طالب الدواء';targetRole='طالب الدواء';}
      return (<div className={`glass-panel rounded-[2rem] p-5 mb-4 mx-1 transition-all ${isCompleted?'opacity-70 grayscale':'hover:border-emerald-200'} ${isInProgress&&(isMine||amIFulfiller)?'ring-2 ring-indigo-500/50':''}`}>{medicine.isUrgent&&!isCompleted&&<div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-red-500 text-white px-4 py-1 rounded-full text-[10px] font-black flex items-center gap-1 z-10 animate-pulse"><AlertOctagon size={12}/> مستعجل</div>}<div className="flex justify-between items-start mb-3 mt-2">{(isPending||isCompleted)&&isMine?<button onClick={()=>onDelete(medicine.id)} className="p-2 bg-red-50 text-red-500 rounded-full"><Trash2 size={16}/></button>:<div className="w-8"/>}<div className="flex-1 text-right px-2 overflow-hidden"><h3 className="font-black text-lg truncate">{medicine.medicineName}</h3><div className="flex items-center justify-end gap-1 text-xs text-slate-400 mt-1"><span>{dateStr}</span><Clock size={12}/><span className="mx-1">•</span><span className="truncate">{medicine.requesterName}</span><User size={12}/></div></div><div className={`border w-12 h-12 rounded-xl flex items-center justify-center ${isPending?'bg-orange-50 text-orange-500':isInProgress?'bg-indigo-50 text-indigo-500':'bg-slate-100 text-emerald-500'}`}><Pill size={24}/></div></div><button onClick={()=>setShowDetails(!showDetails)} className="w-full flex items-center justify-center gap-1 py-2 mb-3 bg-slate-50 rounded-xl text-xs font-bold"><Info size={14}/> {showDetails?'إخفاء التفاصيل':'عرض التفاصيل'} {showDetails?<ChevronUp size={14}/>:<ChevronDown size={14}/>}</button>{showDetails&&(<div className="animate-fadeIn mb-4"><div className="grid grid-cols-2 gap-2 mb-3 text-right"><div className="bg-slate-50 p-2.5 rounded-xl"><span className="text-[10px] text-slate-400">الكمية</span><p className="text-sm font-black">{medicine.quantity||'غير محدد'}</p></div><div className="bg-slate-50 p-2.5 rounded-xl"><span className="text-[10px] text-slate-400">الوصفة</span><p className="text-sm font-black">{medicine.hasPrescription==='yes'?'متوفرة':'غير متوفرة'}</p></div><div className="bg-slate-50 p-2.5 rounded-xl"><span className="text-[10px] text-slate-400">الدفع</span><p className="text-sm font-black">{medicine.paymentStatus==='buy'?'للشراء':'صدقة'}</p></div><div className="bg-slate-50 p-2.5 rounded-xl"><span className="text-[10px] text-slate-400">بالصيدليات</span><p className="text-sm font-black">{medicine.availability==='unavailable'?'مقطوع':'غالي'}</p></div></div>{medicine.description&&<div className="bg-slate-50 p-3 rounded-xl text-sm"><span className="text-[10px] text-slate-400">ملاحظات:</span><p className="whitespace-pre-line">{medicine.description}</p></div>}</div>)}<div className="flex flex-col gap-2 border-t pt-3 border-slate-100">{isPending&&!isMine&&medicine.approved&&<button onClick={()=>onFulfill(medicine.id,userProfile)} className="w-full py-3 bg-brand-accent text-slate-900 rounded-xl font-bold flex items-center justify-center gap-2"><HeartHandshake size={18}/> أتعهد بتوفير الدواء</button>}{isPending&&isMine&&!medicine.approved&&<div className="w-full py-3 bg-orange-50 text-orange-600 rounded-xl text-center text-sm flex items-center justify-center gap-2"><Clock size={16}/> طلبك قيد المراجعة</div>}{isPending&&isMine&&medicine.approved&&<div className="w-full py-3 bg-slate-100 text-slate-500 rounded-xl text-center text-sm">طلبك منشور، بانتظار متبرع</div>}{isInProgress&&(isMine||amIFulfiller)&&(<div className="bg-indigo-50 border border-indigo-200 rounded-2xl p-4"><div className="flex items-center justify-center gap-2 text-indigo-700 font-black mb-3 text-sm"><MessageSquare size={16}/> مساحة التواصل للتسليم</div><p className="text-center text-xs text-indigo-600 mb-4">تواصل مع {targetRole} ({targetName})</p><div className="flex items-center justify-between gap-2 mb-5">{targetPhone?<a href={`tel:${targetPhone}`} className="flex-1 bg-indigo-500 text-white py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2">اتصال<Phone size={14}/></a>:<div className="flex-1 bg-indigo-300 text-white py-3 rounded-xl text-sm">رقم غير متاح</div>}<span dir="ltr" className="text-indigo-800 font-bold bg-white px-4 py-3 rounded-xl">{targetPhone||'---'}</span></div><div className="flex gap-2"><button onClick={()=>onCancelFulfill(medicine.id)} className="flex-1 py-2 bg-white border border-red-200 text-red-500 rounded-xl text-xs font-bold">إلغاء</button><button onClick={()=>onComplete(medicine.id)} className="flex-1 py-2 bg-emerald-500 text-white rounded-xl text-xs font-bold">تم التسليم</button></div></div>)}{isInProgress&&!isMine&&!amIFulfiller&&<div className="w-full py-3 bg-slate-50 text-slate-400 rounded-xl text-center text-sm flex items-center justify-center gap-2"><Clock size={16}/> يوجد شخص يتواصل مع المريض</div>}{isCompleted&&<div className="w-full py-3 bg-emerald-50 text-emerald-600 rounded-xl text-center text-sm flex items-center justify-center gap-2"><CheckCircle2 size={16}/> تم توفير الدواء</div>}</div></div>);
    }

    // ---------- HomeView ----------
    function HomeView({ donors=[], user, userProfile, loading, onCopyPhone, isDark, toggleTheme, setView, showNotification, notifications, markAsRead, deleteNotification, rejectRequest }) {
      const [filterBlood, setFilterBlood] = useState('الكل');
      const [reportingDonor, setReportingDonor] = useState(null);
      const [modalConfig, setModalConfig] = useState({ isOpen: false });
      const filtered = useMemo(() => {
        let result = (Array.isArray(donors)?donors:[]).filter(d => filterBlood === 'الكل' || d.bloodType === filterBlood);
        return result.sort((a,b) => (b.status!==0?1:0) - (a.status!==0?1:0));
      }, [donors, filterBlood]);
      const closeModal = () => setModalConfig(prev => ({...prev, isOpen: false}));
      const handleRate = async (donor) => {
        if (!user) { showNotification('error','سجل الدخول'); setView('login'); return; }
        if (user.uid === donor.id) { showNotification('error','لا يمكنك تقييم نفسك'); return; }
        const raters = Array.isArray(donor.raters)?donor.raters:[];
        const hasRated = raters.includes(user.uid);
        try {
          await updateDoc(doc(db, DONORS_COLLECTION, donor.id), { raters: hasRated ? arrayRemove(user.uid) : arrayUnion(user.uid) });
          showNotification('success', hasRated ? 'تم إلغاء الشكر' : 'تم الشكر');
        } catch { showNotification('error','فشل التحديث'); }
      };
      const submitReport = async (reason) => {
        if (!user) { showNotification('error','سجل الدخول'); setView('login'); return; }
        if (!reportingDonor) return;
        try {
          await addDoc(collection(db, REPORTS_COLLECTION), { reportedDonorId: reportingDonor.id, reportedDonorName: reportingDonor.username || 'متبرع', reporterId: user.uid, reason, status:'pending', createdAt: serverTimestamp() });
          showNotification('success','تم استلام البلاغ'); setReportingDonor(null);
        } catch { showNotification('error','فشل الإبلاغ'); }
      };
      const handleSendRequest = (donor, onSuccess) => {
        if (!user) { showNotification('error','سجل الدخول'); setView('login'); return; }
        if (user.uid === donor.id) { showNotification('error','لا يمكنك طلب نفسك'); return; }
        const phone = userProfile?.phone || '';
        const name = userProfile?.username || 'مريض';
        setModalConfig({ isOpen: true, title: "تأكيد طلب التبرع", message: `سيتم إرسال إشعار للمتبرع "${donor.username||'فاعل خير'}" برقم هاتفك.`, isDestructive: false, confirmText: "إرسال الطلب", action: async () => {
          try {
            await addDoc(collection(db, NOTIFICATIONS_COLLECTION), { toUserId: donor.id, fromUserId: user.uid, fromUserPhone: phone, title: "طلب تبرع عاجل", body: `المستخدم ${name} يحتاج لتبرعك. تواصل معه على ${phone}`, type:'request', read: false, createdAt: serverTimestamp() });
            if (donor.email) { await addDoc(collection(db, MAIL_COLLECTION), { to: donor.email, message: { subject: "طلب تبرع", html: `...` } }); }
            localStorage.setItem(`notify_${donor.id}`, String(Date.now()));
            showNotification('success','تم إرسال الإشعار');
            if (onSuccess) onSuccess();
          } catch { showNotification('error','فشل الإرسال'); }
        }});
      };
      return (
        <div className="pb-32 font-sans" dir="rtl">
          <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} user={user} userProfile={userProfile} />
          <div className="px-6 mb-6 mt-4"><h2 className="text-lg font-black mb-3">تصفية حسب الزمرة</h2><div className="flex gap-3 overflow-x-auto pb-4 no-scrollbar">{['الكل','A+','A-','B+','B-','O+','O-','AB+','AB-'].map(t => (<button key={t} onClick={()=>setFilterBlood(t)} className={`flex-shrink-0 h-10 px-6 rounded-full text-sm font-bold border ${filterBlood===t?'bg-brand-accent text-slate-900 border-brand-accent':'glass-panel text-slate-500'}`}><span dir="ltr">{t}</span></button>))}</div></div>
          <div className="px-2 sm:px-6">
            {loading ? <div className="py-20 flex flex-col items-center gap-4"><Loader2 className="animate-spin text-emerald-500" size={40} /><p>جاري الجلب...</p></div> : filtered.length===0 ? <EmptyState icon={Droplet} title="لا يوجد متبرعين متاحين" desc="كن أول من يتبرع في هذه الفئة." /> : filtered.map(donor => <DonorCard key={donor.id} donor={donor} user={user} onCopyPhone={onCopyPhone} onRate={handleRate} onReport={donor => { if(!user) { setView('login'); showNotification('error','سجل الدخول'); } else setReportingDonor(donor); }} onSendRequest={handleSendRequest} />)}
          </div>
          <ReportModal isOpen={!!reportingDonor} onClose={()=>setReportingDonor(null)} onConfirm={submitReport} donorName={reportingDonor?.username} />
          <CustomModal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} isDestructive={modalConfig.isDestructive} confirmText={modalConfig.confirmText} onCancel={closeModal} onConfirm={()=>{ modalConfig.action?.(); closeModal(); }} />
        </div>
      );
    }

    // ---------- PharmacyView ----------
    function PharmacyView({ isDark, toggleTheme, pharmacies=[], onCopyPhone, setView, notifications, markAsRead, deleteNotification, rejectRequest, showNotification, user, userProfile }) {
      const todayStr = getLocalDateString();
      const formattedDate = new Intl.DateTimeFormat('ar-DZ', { weekday:'long', year:'numeric', month:'long', day:'numeric' }).format(new Date());
      const display = useMemo(() => {
        const safe = Array.isArray(pharmacies)?pharmacies:[];
        const withDuty = safe.filter(p => Array.isArray(p.dutyDates) && p.dutyDates.includes(todayStr));
        const target = withDuty.length > 0 ? withDuty : safe;
        return target.filter(p => isNowWithinPharmacyHours(p)).sort((a,b) => String(a.name||'').localeCompare(String(b.name||''),'ar'));
      }, [pharmacies, todayStr]);
      return (
        <div className="pb-32 font-sans min-h-screen" dir="rtl">
          <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} user={user} userProfile={userProfile} />
          <div className="px-6 mb-6 mt-4 text-center"><h2 className="text-2xl font-black mb-1">الصيدليات المتاحة</h2><p className="text-emerald-600 dark:text-brand-accent font-bold text-sm">تحديث اليوم: {formattedDate}</p><p className="text-slate-400 text-xs mt-2">تظهر الصيدليات المناوبة اليوم، أو المفتوحة الآن.</p></div>
          <div className="px-2 sm:px-6">{display.length===0 ? <EmptyState icon={Stethoscope} title="لا توجد صيدليات مفتوحة" desc="جميع الصيدليات مغلقة حالياً." /> : display.map(p => <PharmacyCard key={p.id} pharmacy={p} onCopyPhone={onCopyPhone} />)}</div>
        </div>
      );
    }

    // ---------- DoctorsView ----------
    function DoctorsView({ doctors=[], user, isDark, toggleTheme, setView, notifications, markAsRead, deleteNotification, rejectRequest, showNotification, onCopyPhone, userProfile }) {
      const sorted = useMemo(() => {
        const safe = Array.isArray(doctors)?doctors:[];
        return [...safe].sort((a,b) => String(a.specialty||'').localeCompare(String(b.specialty||''),'ar') || String(a.name||'').localeCompare(String(b.name||''),'ar'));
      }, [doctors]);
      return (
        <div className="pb-32 font-sans min-h-screen" dir="rtl">
          <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} user={user} userProfile={userProfile} />
          <div className="px-6 mb-6 mt-4 text-center"><h2 className="text-2xl font-black mb-1">دليل الأطباء</h2><p className="text-emerald-600 font-bold text-sm">الاختصاصات، العناوين، التقييمات</p></div>
          <div className="px-2 sm:px-6">{sorted.length===0 ? <EmptyState icon={HeartPulse} title="لا يوجد أطباء" desc="عند إضافة أطباء سيظهرون هنا." /> : sorted.map(d => <DoctorCard key={d.id} doctor={d} user={user} setView={setView} showNotification={showNotification} onCopyPhone={onCopyPhone} />)}</div>
        </div>
      );
    }

    // ---------- MedicinesView ----------
    function MedicinesView({ user, userProfile, medicines=[], loading, isDark, toggleTheme, setView, showNotification, notifications, markAsRead, deleteNotification, rejectRequest }) {
      const [showAddModal, setShowAddModal] = useState(false); const [medName, setMedName] = useState(''); const [quantity, setQuantity] = useState(''); const [hasPrescription, setHasPrescription] = useState('yes'); const [paymentStatus, setPaymentStatus] = useState('charity'); const [availability, setAvailability] = useState('unavailable'); const [isUrgent, setIsUrgent] = useState(false); const [medDesc, setMedDesc] = useState(''); const [adding, setAdding] = useState(false); const [modalConfig, setModalConfig] = useState({ isOpen: false });
      const visible = useMemo(() => { const safe = Array.isArray(medicines)?medicines:[]; return safe.filter(m => m.approved===true || (user && m.requesterId===user.uid)).sort((a,b) => (b.createdAt?.toDate?.()||0) - (a.createdAt?.toDate?.()||0)); }, [medicines, user]);
      const closeModal = () => setModalConfig(prev => ({...prev, isOpen: false}));
      const resetForm = () => { setMedName(''); setQuantity(''); setHasPrescription('yes'); setPaymentStatus('charity'); setAvailability('unavailable'); setIsUrgent(false); setMedDesc(''); };
      const handleAddRequest = async (e) => { e.preventDefault(); if (!user) { showNotification('error','سجل الدخول'); setView('login'); return; } if (medName.trim().length<2) { showNotification('error','اسم الدواء قصير'); return; } if (quantity.trim().length<1) { showNotification('error','أدخل الكمية'); return; } setAdding(true); try { await addDoc(collection(db, MEDICINES_COLLECTION), { medicineName: medName.trim(), quantity: quantity.trim(), hasPrescription, paymentStatus, availability, isUrgent, description: medDesc.trim(), requesterId: user.uid, requesterName: userProfile?.username||'مريض', requesterPhone: userProfile?.phone||'', status:'pending', fulfillerId:null, fulfillerName:null, fulfillerPhone:null, approved: false, createdAt: serverTimestamp(), updatedAt: serverTimestamp() }); showNotification('success','تم إضافة الطلب، بانتظار المراجعة'); setShowAddModal(false); resetForm(); } catch { showNotification('error','فشل الإضافة'); } finally { setAdding(false); } };
      const handleFulfill = (id, currentProfile) => { if (!user) { showNotification('error','سجل الدخول'); setView('login'); return; } setModalConfig({ isOpen:true, title:"تأكيد التكفل", message:"هل أنت متأكد أنك تستطيع توفير هذا الدواء؟", isDestructive:false, confirmText:"نعم، أتعهد", action: async () => { try { await updateDoc(doc(db, MEDICINES_COLLECTION, id), { status:'in_progress', fulfillerId:user.uid, fulfillerName:currentProfile?.username||'فاعل خير', fulfillerPhone:currentProfile?.phone||'', updatedAt:serverTimestamp() }); showNotification('success','جزاك الله خيراً'); } catch { showNotification('error','فشل التحديث'); } } }); };
      const handleCancelFulfill = (id) => { setModalConfig({ isOpen:true, title:"إلغاء التكفل", message:"سيعود الطلب للظهور للعامة.", isDestructive:true, confirmText:"نعم، إلغاء", action: async () => { try { await updateDoc(doc(db, MEDICINES_COLLECTION, id), { status:'pending', fulfillerId:null, fulfillerName:null, fulfillerPhone:null, updatedAt:serverTimestamp() }); showNotification('success','تم الإلغاء'); } catch { showNotification('error','فشل'); } } }); };
      const handleComplete = (id) => { setModalConfig({ isOpen:true, title:"تأكيد التسليم", message:"هل تم تسليم الدواء؟", isDestructive:false, confirmText:"نعم، تم التسليم", action: async () => { try { await updateDoc(doc(db, MEDICINES_COLLECTION, id), { status:'completed', completedAt:serverTimestamp(), updatedAt:serverTimestamp() }); showNotification('success','تم إغلاق الطلب'); } catch { showNotification('error','فشل'); } } }); };
      const handleDelete = (id) => { setModalConfig({ isOpen:true, title:"حذف الطلب", message:"هل أنت متأكد من حذف الطلب نهائياً؟", isDestructive:true, confirmText:"حذف نهائي", action: async () => { try { await deleteDoc(doc(db, MEDICINES_COLLECTION, id)); showNotification('success','تم الحذف'); } catch { showNotification('error','فشل الحذف'); } } }); };
      return (
        <div className="pb-32 font-sans min-h-screen relative" dir="rtl">
          <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} user={user} userProfile={userProfile} />
          <div className="px-6 mb-6 flex justify-between items-end mt-4"><div><h2 className="text-2xl font-black mb-1">الأدوية المفقودة</h2><p className="text-sm text-slate-500">منصة لطلب وتوفير الأدوية</p></div><button onClick={()=>{ if(!user){ setView('login'); showNotification('error','سجل الدخول'); } else setShowAddModal(true); }} className="w-12 h-12 bg-brand-accent text-slate-900 rounded-2xl flex items-center justify-center shadow-lg"><Plus size={24} strokeWidth={3}/></button></div>
          <div className="px-2 sm:px-6 mt-6">{loading ? <div className="py-20 flex flex-col items-center gap-4"><Loader2 className="animate-spin text-emerald-500" size={40}/><p>جاري الجلب...</p></div> : visible.length===0 ? <EmptyState icon={Pill} title="لا توجد طلبات أدوية" desc="اضغط على + لطلب دواء."/> : visible.map(m => <MedicineCard key={m.id} medicine={m} user={user} userProfile={userProfile} onFulfill={handleFulfill} onCancelFulfill={handleCancelFulfill} onComplete={handleComplete} onDelete={handleDelete} showNotification={showNotification}/>)}</div>
          {showAddModal&&(<div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-slate-900/50 backdrop-blur-sm animate-fadeIn p-0 sm:p-4"><div className="glass-panel w-full sm:max-w-lg bg-white dark:bg-slate-900 rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 shadow-2xl relative border-t sm:border max-h-[90vh] overflow-y-auto no-scrollbar"><button onClick={()=>setShowAddModal(false)} className="absolute top-6 left-6 p-2 bg-slate-100 dark:bg-slate-800 rounded-full"><X size={20}/></button><h2 className="text-2xl font-black text-emerald-600 dark:text-brand-accent mb-1 text-right mt-2">استمارة طلب دواء</h2><p className="text-sm text-slate-500 mb-6 text-right">املأ التفاصيل بدقة.</p><form onSubmit={handleAddRequest} className="space-y-4"><div className="grid grid-cols-3 gap-3"><div className="col-span-2"><label className="block text-xs font-bold mb-2 text-right">اسم الدواء والجرعة *</label><input type="text" placeholder="Paracetamol 500mg" className="custom-input w-full h-12 px-4 rounded-xl text-right" value={medName} onChange={e=>setMedName(e.target.value)} required/></div><div><label className="block text-xs font-bold mb-2 text-right">الكمية *</label><input type="text" placeholder="علبة" className="custom-input w-full h-12 px-4 rounded-xl text-right" value={quantity} onChange={e=>setQuantity(e.target.value)} required/></div></div><div><label className="block text-xs font-bold mb-2 text-right">هل لديك وصفة؟</label><select className="custom-input custom-select w-full h-12 px-4 rounded-xl text-right" value={hasPrescription} onChange={e=>setHasPrescription(e.target.value)}><option value="yes">نعم</option><option value="no">لا</option></select></div><div><label className="block text-xs font-bold mb-2 text-right">الدفع</label><select className="custom-input custom-select w-full h-12 px-4 rounded-xl text-right" value={paymentStatus} onChange={e=>setPaymentStatus(e.target.value)}><option value="buy">سأدفع ثمنه</option><option value="charity">أحتاجه كصدقة</option></select></div><div><label className="block text-xs font-bold mb-2 text-right">هل بحثت عنه في الصيدليات؟</label><select className="custom-input custom-select w-full h-12 px-4 rounded-xl text-right" value={availability} onChange={e=>setAvailability(e.target.value)}><option value="unavailable">غير متوفر (مقطوع)</option><option value="available">متوفر لكن غالي</option></select></div><div className="bg-red-50 dark:bg-red-500/10 border border-red-200 p-3 rounded-xl"><label className="flex items-center gap-3 cursor-pointer"><input type="checkbox" className="w-5 h-5 accent-red-500" checked={isUrgent} onChange={e=>setIsUrgent(e.target.checked)}/><span className="font-bold text-red-600 text-sm">حالة مستعجلة جداً</span></label></div><div><label className="block text-xs font-bold mb-2 text-right">ملاحظات</label><textarea placeholder="تفاصيل إضافية..." className="custom-input w-full h-24 p-4 rounded-xl text-right resize-none" value={medDesc} onChange={e=>setMedDesc(e.target.value)}></textarea></div><button type="submit" disabled={adding} className="w-full h-14 bg-emerald-500 dark:bg-brand-accent text-white dark:text-slate-900 rounded-2xl font-black shadow-lg flex items-center justify-center gap-2">{adding?<Loader2 className="animate-spin"/>:'إرسال الطلب للإدارة'}</button></form></div></div>)}
          <CustomModal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} isDestructive={modalConfig.isDestructive} confirmText={modalConfig.confirmText} onCancel={closeModal} onConfirm={()=>{ modalConfig.action?.(); closeModal(); }}/>
        </div>
      );
    }

    // ---------- LoginView ----------
    function LoginView({ setView, showNotification }) {
      const [email, setEmail] = useState(''); const [password, setPassword] = useState(''); const [showPassword, setShowPassword] = useState(false); const [loading, setLoading] = useState(false); const [showForgot, setShowForgot] = useState(false);
      const handleLogin = async (e) => { e.preventDefault(); if(!email||!password){ showNotification('error','أدخل البريد وكلمة المرور'); return; } setLoading(true); try { await signInWithEmailAndPassword(auth, email.trim(), password); showNotification('success','تم الدخول'); setView('profile'); } catch(err){ showNotification('error', (err.code==='auth/invalid-credential'||err.code==='auth/user-not-found'||err.code==='auth/wrong-password')?'بيانات خاطئة':'خطأ في الدخول'); } finally { setLoading(false); } };
      return (
        <div className="min-h-screen flex flex-col justify-center items-center p-6 animate-fadeIn relative">
          <button onClick={()=>setView('home')} className="absolute top-6 left-6 p-3 glass-panel text-slate-500 rounded-full flex items-center gap-2"><ArrowRight size={18}/> رجوع</button>
          <div className="w-full max-w-md"><div className="flex justify-center mb-8"><div className="w-20 h-20 glass-panel rounded-[1.5rem] flex items-center justify-center"><Droplet size={40} className="text-emerald-500" fill="currentColor"/></div></div><h2 className="text-3xl font-black text-center mb-2">مرحباً بعودتك</h2><p className="text-center text-sm text-slate-500 mb-8">سجل دخولك لإدارة حسابك.</p><form onSubmit={handleLogin} className="space-y-5"><div className="relative"><input type="email" placeholder="البريد الإلكتروني" className="custom-input w-full h-14 px-4 rounded-full text-right pr-4 pl-12" value={email} onChange={e=>setEmail(e.target.value)} required/><Mail size={22} className="absolute left-4 top-4 text-slate-400"/></div><div className="relative"><input type={showPassword?'text':'password'} placeholder="كلمة المرور" className="custom-input w-full h-14 px-4 rounded-full text-right pr-4 pl-12" value={password} onChange={e=>setPassword(e.target.value)} required/><div className="absolute left-4 top-4 text-slate-400 cursor-pointer" onClick={()=>setShowPassword(!showPassword)}>{showPassword?<EyeOff size={20}/>:<Eye size={20}/>}</div></div><div className="flex justify-end"><button type="button" onClick={()=>setShowForgot(true)} className="text-sm font-bold text-emerald-600">نسيت كلمة المرور؟</button></div><button type="submit" disabled={loading} className="w-full h-14 bg-brand-accent text-slate-900 rounded-full font-black text-lg flex items-center justify-center">{loading?<Loader2 className="animate-spin"/>:'تسجيل الدخول'}</button></form><div className="mt-8 text-center"><button onClick={()=>setView('register')} className="text-slate-500 font-bold">ليس لديك حساب؟ <span className="text-emerald-600">إنشاء حساب</span></button></div></div>
          <ForgotPasswordModal isOpen={showForgot} onClose={()=>setShowForgot(false)} showNotification={showNotification}/>
        </div>
      );
    }

    // ---------- RegisterView ----------
    function RegisterView({ setView, showNotification }) {
      const [form, setForm] = useState({ username:'', email:'', password:'', phone:'', neighborhood:'', municipality:'الأمير عبد القادر', bloodType:'A+' }); const [isPhoneHidden, setIsPhoneHidden] = useState(false); const [acceptTerms, setAcceptTerms] = useState(false); const [showTerms, setShowTerms] = useState(false); const [loading, setLoading] = useState(false);
      const handleSubmit = async (e) => { e.preventDefault(); if(!acceptTerms){ showNotification('error','وافق على الشروط'); return; } if(form.username.trim().length<3){ showNotification('error','الاسم قصير'); return; } if(form.phone.trim().length<10){ showNotification('error','رقم الهاتف قصير'); return; } if(form.neighborhood.trim().length<2){ showNotification('error','أدخل الحي'); return; } setLoading(true); try { const cred = await createUserWithEmailAndPassword(auth, form.email.trim(), form.password); await setDoc(doc(db, DONORS_COLLECTION, cred.user.uid), { uid: cred.user.uid, username: form.username.trim(), email: form.email.trim(), phone: form.phone.trim(), neighborhood: form.neighborhood.trim(), municipality: form.municipality, bloodType: form.bloodType, status:1, raters:[], isPhoneHidden, createdAt: serverTimestamp(), lastDonationDate: null }); showNotification('success','تم إنشاء الحساب'); setView('profile'); } catch(err){ let msg='فشل التسجيل'; if(err.code==='auth/email-already-in-use') msg='البريد مستخدم بالفعل'; else if(err.code==='auth/weak-password') msg='كلمة المرور ضعيفة'; else if(err.code==='auth/invalid-email') msg='بريد غير صحيح'; showNotification('error',msg); } finally{ setLoading(false); } };
      return (
        <div className="min-h-screen p-4 sm:p-6 flex flex-col justify-center font-sans pb-24" dir="rtl">
          <div className="glass-panel rounded-[2.5rem] p-6 sm:p-8 shadow-2xl relative max-w-md mx-auto w-full"><button onClick={()=>setView('home')} className="absolute top-6 left-6 text-slate-400 flex items-center gap-1"><ArrowRight size={16}/> إغلاق</button><h2 className="text-2xl font-black text-emerald-600 dark:text-brand-accent mb-2 text-center mt-4">انضم للمتبرعين</h2><p className="text-center text-sm text-slate-500 mb-6">أنشئ حسابك ليظهر اسمك.</p><form onSubmit={handleSubmit} className="space-y-4"><input placeholder="الاسم المستعار" className="custom-input h-12 rounded-xl px-4 w-full text-right" value={form.username} onChange={e=>setForm({...form,username:e.target.value})} required/><div className="grid grid-cols-2 gap-3"><input value="بلدية الأمير عبد القادر" disabled className="custom-input h-12 rounded-xl px-4 text-right opacity-70 bg-slate-100"/><input placeholder="الحي / الدوار" className="custom-input h-12 rounded-xl px-4 text-right" value={form.neighborhood} onChange={e=>setForm({...form,neighborhood:e.target.value})} required/></div><input type="email" placeholder="البريد الإلكتروني" className="custom-input h-12 rounded-xl px-4 w-full text-right" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required/><input type="password" placeholder="كلمة المرور (6 أحرف)" className="custom-input h-12 rounded-xl px-4 w-full text-right" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required minLength={6}/><div className="flex gap-2"><input type="tel" placeholder="رقم الهاتف" className="custom-input h-12 rounded-xl px-4 text-right flex-1" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} dir="ltr" required/><button type="button" onClick={()=>setIsPhoneHidden(!isPhoneHidden)} className={`h-12 px-4 rounded-xl border ${isPhoneHidden?'bg-indigo-50 border-indigo-200 text-indigo-600':'bg-slate-50 border-slate-200 text-slate-500'}`}>{isPhoneHidden?<EyeOffIcon size={20}/>:<Eye size={20}/>}</button></div><select className="custom-input custom-select h-12 rounded-xl px-4 w-full text-center font-bold text-lg" value={form.bloodType} onChange={e=>setForm({...form,bloodType:e.target.value})}>{['A+','O+','B+','AB+','A-','O-','B-','AB-'].map(t=><option key={t} value={t}>{t}</option>)}</select><div className="flex items-start gap-3 p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl mt-4"><input type="checkbox" checked={acceptTerms} onChange={e=>setAcceptTerms(e.target.checked)} className="mt-1 w-5 h-5 accent-emerald-500"/><label className="text-xs font-bold">أوافق على <button type="button" onClick={()=>setShowTerms(true)} className="text-emerald-600 underline">شروط الاستخدام</button></label></div><button type="submit" disabled={loading||!acceptTerms} className="w-full h-14 bg-brand-accent text-slate-900 rounded-2xl font-black shadow-lg flex justify-center items-center disabled:opacity-50">{loading?<Loader2 className="animate-spin"/>:'تسجيل وانضمام'}</button></form></div>
          <BaseModal isOpen={showTerms} onClose={()=>setShowTerms(false)}><h2 className="text-xl font-black text-emerald-600 mb-4">شروط الاستخدام</h2><div className="text-xs text-slate-600 space-y-3 text-right leading-relaxed"><p>هذا التطبيق منصة تقنية للربط بين المتبرعين والمحتاجين. لا يغني عن الإجراءات الطبية الرسمية.</p><p>المطور غير مسؤول عن دقة البيانات أو سوء استخدامها.</p><p>يمنع طلب مقابل مادي للتبرع.</p><p>بتسجيلك أنت توافق على هذه الشروط.</p></div><button onClick={()=>{setAcceptTerms(true);setShowTerms(false);}} className="w-full mt-6 h-12 bg-emerald-500 text-white rounded-xl font-bold">موافق</button></BaseModal>
        </div>
      );
    }
    // ProfileView, App, render... (same as before - continuing below)
    // ---------- ProfileView ----------
    function ProfileView({ user, donorData, showNotification, isDark, toggleTheme, setView, notifications, markAsRead, deleteNotification, rejectRequest }) {
      const [loading, setLoading] = useState(false); const [editPhone, setEditPhone] = useState(false); const [newPhone, setNewPhone] = useState(''); const [editUsername, setEditUsername] = useState(false); const [newUsername, setNewUsername] = useState(''); const [editNeighborhood, setEditNeighborhood] = useState(false); const [newNeighborhood, setNewNeighborhood] = useState(''); const [modalConfig, setModalConfig] = useState({ isOpen: false });
      useEffect(()=>{ if(donorData){ setNewPhone(donorData.phone||''); setNewUsername(donorData.username||''); setNewNeighborhood(donorData.neighborhood||''); } },[donorData]);
      const closeModal = () => setModalConfig(prev=>({...prev,isOpen:false}));
      if(!donorData) return <div className="min-h-screen flex items-center justify-center"><Loader2 className="animate-spin text-emerald-500" size={40}/></div>;
      let isEligible=true, daysRemaining=0;
      if(donorData.lastDonationDate){ const last=typeof donorData.lastDonationDate?.toDate==='function'?donorData.lastDonationDate.toDate():new Date(); const next=new Date(last.getTime()+COOLDOWN_DAYS*86400000); if(new Date()<next){ isEligible=false; daysRemaining=Math.ceil((next-new Date())/86400000); } }
      const updateField = async (field, value, setEditing) => { if(!value.trim()||value.trim().length<2){ showNotification('error','القيمة قصيرة'); return; } setLoading(true); try{ await setDoc(doc(db,DONORS_COLLECTION,user.uid),{[field]:value.trim(),updatedAt:serverTimestamp()},{merge:true}); showNotification('success','تم التحديث'); setEditing(false); }catch{ showNotification('error','فشل التحديث'); } finally{setLoading(false);} };
      const toggleStatus = async () => { if(!isEligible){ showNotification('error',`متبقي ${daysRemaining} يوم`); return; } setLoading(true); try{ await setDoc(doc(db,DONORS_COLLECTION,user.uid),{status:donorData.status!==0?0:1,updatedAt:serverTimestamp()},{merge:true}); showNotification('success',donorData.status!==0?'أصبحت مخفياً':'أنت متاح للتبرع'); }catch{ showNotification('error','فشل'); } finally{setLoading(false);} };
      const togglePhoneVisibility = async () => { setLoading(true); try{ await setDoc(doc(db,DONORS_COLLECTION,user.uid),{isPhoneHidden:!donorData.isPhoneHidden,updatedAt:serverTimestamp()},{merge:true}); showNotification('success','تم تحديث الخصوصية'); }catch{ showNotification('error','فشل'); } finally{setLoading(false);} };
      const handleDonated = () => setModalConfig({ isOpen:true, title:"تأكيد التبرع", message:"سيتم إخفاء حسابك 90 يوماً.", isDestructive:false, confirmText:"نعم، تبرعت", action: async () => { setLoading(true); try{ await setDoc(doc(db,DONORS_COLLECTION,user.uid),{lastDonationDate:serverTimestamp(),status:0,updatedAt:serverTimestamp()},{merge:true}); showNotification('success','بدأت فترة النقاهة'); }catch{ showNotification('error','فشل'); } finally{setLoading(false);} } });
      const handleCancelCooldown = () => setModalConfig({ isOpen:true, title:"إلغاء النقاهة", message:"للغاء الخطأ فقط.", isDestructive:false, confirmText:"نعم، إلغاء", action: async () => { setLoading(true); try{ await setDoc(doc(db,DONORS_COLLECTION,user.uid),{lastDonationDate:null,status:1,updatedAt:serverTimestamp()},{merge:true}); showNotification('success','تم إلغاء النقاهة'); }catch{ showNotification('error','فشل'); } finally{setLoading(false);} } });
      const handleLogout = () => setModalConfig({ isOpen:true, title:"تسجيل الخروج", message:"هل أنت متأكد؟", isDestructive:true, confirmText:"خروج", action: async () => { await signOut(auth); window.location.reload(); } });
      const handleDeleteAccount = () => setModalConfig({ isOpen:true, title:"حذف الحساب", message:"سيتم حذف حسابك نهائياً.", isDestructive:true, confirmText:"حذف نهائي", action: async () => { setLoading(true); try{ await deleteDoc(doc(db,DONORS_COLLECTION,user.uid)); await deleteUser(user); window.location.reload(); }catch{ showNotification('error','سجل الخروج ثم حاول مجدداً'); } finally{setLoading(false);} } });
      const isAvailable = donorData.status !== 0;
      return (
        <div className="pb-32 font-sans" dir="rtl">
          <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} user={user} userProfile={donorData} />
          <div className="px-6">
            <div className="flex flex-col items-center mb-6 animate-fadeIn">
              <div className="w-24 h-24 rounded-full glass-panel flex items-center justify-center mb-4 relative"><User size={40} className={isAvailable&&isEligible?"text-emerald-500":"text-slate-400"}/><div className={`absolute bottom-0 right-0 w-6 h-6 rounded-full border-[3px] border-white dark:border-slate-900 ${isAvailable&&isEligible?'bg-emerald-500':'bg-slate-400'}`}></div></div>
              {editUsername?(<div className="flex items-center gap-1 glass-panel p-1 rounded-xl"><input value={newUsername} onChange={e=>setNewUsername(e.target.value)} className="w-40 text-center bg-slate-50 rounded-lg px-2 py-1 outline-none font-bold"/><button onClick={()=>updateField('username',newUsername,setEditUsername)} className="bg-brand-accent p-1.5 rounded-lg"><Save size={16}/></button><button onClick={()=>setEditUsername(false)} className="bg-red-100 text-red-500 p-1.5 rounded-lg"><X size={16}/></button></div>):(<h2 className="text-2xl font-black flex items-center gap-2">{donorData.username||'مستخدم'}<button onClick={()=>setEditUsername(true)} className="text-slate-400"><Edit2 size={16}/></button></h2>)}
              {editPhone?(<div className="flex items-center gap-1 glass-panel p-1 rounded-xl mt-2"><input value={newPhone} onChange={e=>setNewPhone(e.target.value)} className="w-32 text-center bg-slate-50 rounded-lg px-2 py-1 outline-none font-bold" dir="ltr"/><button onClick={()=>updateField('phone',newPhone,setEditPhone)} className="bg-brand-accent p-1.5 rounded-lg"><Save size={16}/></button><button onClick={()=>setEditPhone(false)} className="bg-red-100 text-red-500 p-1.5 rounded-lg"><X size={16}/></button></div>):(<div className="flex items-center gap-2 glass-panel px-4 py-1.5 rounded-full mt-2"><Phone size={14} className="text-slate-400"/><span dir="ltr" className="font-bold">{donorData.phone||'---'}</span><button onClick={()=>setEditPhone(true)} className="text-emerald-600"><Edit2 size={14}/></button></div>)}
              {editNeighborhood?(<div className="flex items-center gap-1 glass-panel p-1 rounded-xl mt-2"><input value={newNeighborhood} onChange={e=>setNewNeighborhood(e.target.value)} className="w-32 text-center bg-slate-50 rounded-lg px-2 py-1 outline-none font-bold"/><button onClick={()=>updateField('neighborhood',newNeighborhood,setEditNeighborhood)} className="bg-brand-accent p-1.5 rounded-lg"><Save size={16}/></button><button onClick={()=>setEditNeighborhood(false)} className="bg-red-100 text-red-500 p-1.5 rounded-lg"><X size={16}/></button></div>):(<div className="flex items-center gap-2 bg-slate-100 dark:bg-slate-800/50 px-4 py-1.5 rounded-full text-sm mt-2"><MapPin size={14} className="text-slate-400"/><span>{donorData.neighborhood||'الأمير عبد القادر'}</span><button onClick={()=>setEditNeighborhood(true)} className="text-slate-400"><Edit2 size={12}/></button><span className="mx-1">•</span><span dir="ltr" className="font-bold text-emerald-600">{donorData.bloodType||'-'}</span></div>)}
            </div>
            {!isEligible&&(<div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 mb-4 text-center relative"><button onClick={handleCancelCooldown} className="absolute top-2 left-2 p-2 bg-white/50 text-blue-400 text-[10px] font-bold rounded-full flex items-center gap-1"><RotateCcw size={14}/> إلغاء بالخطأ</button><CalendarClock size={28} className="text-blue-500 mx-auto mb-2 mt-2"/><h4 className="font-bold text-blue-700 mb-1">فترة نقاهة صحية</h4><div className="bg-white py-2 rounded-xl text-blue-800 font-black mx-4 mt-2">متبقي {daysRemaining} يوماً</div></div>)}
            <div className="flex gap-4 mb-4">
              <div onClick={!loading&&isEligible?toggleStatus:undefined} className={`flex-1 relative overflow-hidden rounded-[2rem] p-5 shadow-xl glass-panel ${!isAvailable&&isEligible?'opacity-70 grayscale':''} ${!isEligible?'opacity-60':'cursor-pointer active:scale-95'}`}><div className={`absolute top-0 left-0 w-full h-1 ${isAvailable&&isEligible?'bg-emerald-500':'bg-slate-300'}`}/><div className="flex flex-col items-center"><h3 className="font-black text-sm mb-2">{isAvailable?'متاح للعامة':'حساب مخفي'}</h3><div className={`w-12 h-6 rounded-full flex items-center p-1 ${isAvailable&&isEligible?'bg-emerald-500':'bg-slate-300'}`}><div className={`w-4 h-4 bg-white rounded-full shadow-md transform ${isAvailable&&isEligible?'-translate-x-6':''}`}/></div></div></div>
              <div onClick={!loading?togglePhoneVisibility:undefined} className={`flex-1 relative overflow-hidden rounded-[2rem] p-5 shadow-xl glass-panel cursor-pointer active:scale-95 ${donorData.isPhoneHidden?'opacity-70 grayscale':''}`}><div className={`absolute top-0 left-0 w-full h-1 ${!donorData.isPhoneHidden?'bg-indigo-500':'bg-slate-300'}`}/><div className="flex flex-col items-center"><h3 className="font-black text-sm mb-2">{!donorData.isPhoneHidden?'رقمي ظاهر':'رقمي مخفي'}</h3><div className={`w-12 h-6 rounded-full flex items-center p-1 ${!donorData.isPhoneHidden?'bg-indigo-500':'bg-slate-300'}`}><div className={`w-4 h-4 bg-white rounded-full shadow-md transform ${!donorData.isPhoneHidden?'-translate-x-6':''}`}/></div></div></div>
            </div>
            {isEligible&&<button onClick={handleDonated} className="w-full mt-2 bg-white dark:bg-slate-900 border-2 border-emerald-500 text-emerald-600 py-4 rounded-[2rem] font-bold flex items-center justify-center gap-2"><ShieldCheck size={22}/> تبرعت اليوم، بدء النقاهة</button>}
            <div className="mt-8 text-center flex flex-col gap-4"><button onClick={handleLogout} className="text-slate-500 hover:text-slate-800 text-sm font-bold flex items-center justify-center gap-2 w-full py-4 glass-panel rounded-2xl"><LogOut size={16}/> تسجيل الخروج</button><button onClick={handleDeleteAccount} className="text-red-400 hover:text-red-500 text-sm font-bold flex items-center justify-center gap-2 w-full py-4 glass-panel rounded-2xl"><Trash2 size={16}/> حذف حسابي نهائياً</button></div>
          </div>
          <CustomModal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} isDestructive={modalConfig.isDestructive} confirmText={modalConfig.confirmText} onCancel={closeModal} onConfirm={()=>{ modalConfig.action?.(); closeModal(); }}/>
        </div>
      );
    }

    // ---------- App ----------
    function App() {
      const [user, setUser] = useState(null); const [userProfile, setUserProfile] = useState(null); const [donors, setDonors] = useState([]); const [medicines, setMedicines] = useState([]); const [pharmacies, setPharmacies] = useState([]); const [doctors, setDoctors] = useState([]); const [notifications, setNotifications] = useState([]); const [view, setView] = useState('home'); const [loading, setLoading] = useState(true); const [loadingMed, setLoadingMed] = useState(true); const [notification, setNotification] = useState(null); const [initializing, setInitializing] = useState(true); const [isDark, setIsDark] = useState(() => localStorage.getItem('theme') === 'dark');
      useEffect(() => { document.documentElement.classList.toggle('dark', isDark); localStorage.setItem('theme', isDark ? 'dark' : 'light'); }, [isDark]);
      useEffect(() => { let unsubProfile, unsubNotifs; const unsubAuth = onAuthStateChanged(auth, (currentUser) => { if (unsubProfile) { unsubProfile(); unsubProfile = null; } if (unsubNotifs) { unsubNotifs(); unsubNotifs = null; } if (currentUser) { setUser(currentUser); unsubProfile = onSnapshot(doc(db, DONORS_COLLECTION, currentUser.uid), (snap) => { setUserProfile(snap.exists() ? { id: snap.id, ...snap.data() } : null); setInitializing(false); }, () => setInitializing(false)); unsubNotifs = onSnapshot(query(collection(db, NOTIFICATIONS_COLLECTION), orderBy('createdAt','desc')), (snap) => { setNotifications(snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(n => n.toUserId === currentUser.uid)); }); } else { setUser(null); setUserProfile(null); setNotifications([]); setInitializing(false); } }); return () => { unsubAuth(); if (unsubProfile) unsubProfile(); if (unsubNotifs) unsubNotifs(); }; }, []);
      useEffect(() => { const unsubDonors = onSnapshot(query(collection(db, DONORS_COLLECTION), orderBy('createdAt','desc')), snap => { setDonors(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoading(false); }, () => setLoading(false)); const unsubMed = onSnapshot(query(collection(db, MEDICINES_COLLECTION), orderBy('createdAt','desc')), snap => { setMedicines(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoadingMed(false); }, () => setLoadingMed(false)); const unsubPharm = onSnapshot(query(collection(db, PHARMACIES_COLLECTION), orderBy('createdAt','desc')), snap => setPharmacies(snap.docs.map(d => ({ id: d.id, ...d.data() })))); const unsubDoctors = onSnapshot(collection(db, DOCTORS_COLLECTION), snap => setDoctors(snap.docs.map(d => ({ id: d.id, ...d.data() })))); return () => { unsubDonors(); unsubMed(); unsubPharm(); unsubDoctors(); }; }, []);
      const showNotification = (type, msg) => { setNotification({ type, msg }); setTimeout(() => setNotification(null), 3500); };
      const handleCopy = (value) => { if (!value) { showNotification('error','لا شيء لنسخه'); return; } navigator.clipboard.writeText(value); showNotification('success','تم النسخ'); };
      const toggleTheme = () => setIsDark(!isDark);
      const markAsRead = async (id) => { try { await updateDoc(doc(db, NOTIFICATIONS_COLLECTION, id), { read: true }); } catch {} };
      const deleteNotification = async (id) => { try { await deleteDoc(doc(db, NOTIFICATIONS_COLLECTION, id)); } catch {} };
      const rejectRequest = async (notif) => { if (!user || !userProfile || !notif) return; try { await addDoc(collection(db, NOTIFICATIONS_COLLECTION), { toUserId: notif.fromUserId, fromUserId: user.uid, title: "اعتذار عن التبرع", body: `نعتذر، ${userProfile.username||'متبرع'} غير متاح حالياً.`, type:'info', read:false, createdAt: serverTimestamp() }); await deleteDoc(doc(db, NOTIFICATIONS_COLLECTION, notif.id)); showNotification('success','تم الاعتذار'); } catch { showNotification('error','فشل'); } };
      if (initializing) return <div className="min-h-screen flex items-center justify-center"><Loader2 className="animate-spin text-emerald-500" size={48}/></div>;
      return (
        <div className="min-h-screen relative">
          {view === 'home' && <HomeView donors={donors} user={user} userProfile={userProfile} loading={loading} onCopyPhone={handleCopy} isDark={isDark} toggleTheme={toggleTheme} setView={setView} showNotification={showNotification} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} />}
          {view === 'pharmacy' && <PharmacyView pharmacies={pharmacies} onCopyPhone={handleCopy} isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} user={user} userProfile={userProfile} />}
          {view === 'doctors' && <DoctorsView doctors={doctors} user={user} isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} onCopyPhone={handleCopy} userProfile={userProfile} />}
          {view === 'medicines' && <MedicinesView user={user} userProfile={userProfile} medicines={medicines} loading={loadingMed} isDark={isDark} toggleTheme={toggleTheme} setView={setView} showNotification={showNotification} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} />}
          {view === 'login' && <LoginView setView={setView} showNotification={showNotification} />}
          {view === 'register' && <RegisterView setView={setView} showNotification={showNotification} />}
          {view === 'profile' && <ProfileView user={user} donorData={userProfile} showNotification={showNotification} isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} />}
          <BottomNav view={view} setView={setView} user={user} />
          <Toast notification={notification} />
        </div>
      );
    }
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- ========== PWA Service Worker & Install Handler ========== -->
  <script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(r => console.log('[PWA] SW registered:', r.scope)).catch(() => console.warn('[PWA] SW skipped (no sw.js)'));
      });
    }

    // Install Prompt Handler
    let deferredPrompt;
    const installBanner = document.getElementById('pwa-install-banner');
    const installBtn = document.getElementById('pwa-install-btn');

    function isAppInstalled() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    function showInstallBanner() {
      if (installBanner && !isAppInstalled()) {
        const dismissed = localStorage.getItem('pwa-install-dismissed');
        if (dismissed && Date.now() - parseInt(dismissed) < 24 * 60 * 60 * 1000) return;
        installBanner.style.display = 'block';
      }
    }

    window.dismissInstallBanner = function() {
      if (installBanner) { installBanner.style.display = 'none'; localStorage.setItem('pwa-install-dismissed', String(Date.now())); }
    };

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      window._deferredPWAInstall = deferredPrompt;
      setTimeout(showInstallBanner, 2000);
    });

    if (installBtn) {
      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) {
          const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
          if (isIOS) alert('لتثبيت التطبيق:\n\n1. اضغط على زر المشاركة 📤 في المتصفح\n2. اختر "إضافة إلى الشاشة الرئيسية"');
          dismissInstallBanner();
          return;
        }
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') { deferredPrompt = null; window._deferredPWAInstall = null; }
        dismissInstallBanner();
      });
    }

    window.addEventListener('appinstalled', () => { deferredPrompt = null; window._deferredPWAInstall = null; dismissInstallBanner(); });
  </script>
</body>
</html>
