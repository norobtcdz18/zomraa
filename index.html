<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zomraa - قطرة حياة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
        darkMode: 'class', 
        theme: { 
            extend: { 
                fontFamily: { sans: ['Cairo', 'sans-serif'] }, 
                colors: { 
                    brand: { 
                        accent: '#CDEB57', 
                        accentHover: '#b9d64a'
                    } 
                } 
            } 
        } 
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Cairo', sans-serif; transition: background 0.3s ease, color 0.3s ease; -webkit-tap-highlight-color: transparent; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
    
    body { background-color: #F8FAFC; color: #1e293b; }
    .glass-panel { background-color: #ffffff; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    .custom-input { background-color: #f8fafc; border: 1px solid #e2e8f0; color: #1e293b; }
    .custom-input::placeholder { color: #94a3b8; }
    .custom-select option { background-color: #ffffff; color: #1e293b; }
    
    html.dark body { background: linear-gradient(145deg, #0f172a 0%, #020617 100%); background-attachment: fixed; color: #f8fafc; }
    html.dark .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
    html.dark .custom-input { background-color: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: #f8fafc; }
    html.dark .custom-input::placeholder { color: #94a3b8; }
    html.dark .custom-select option { background-color: #1e293b; color: #f8fafc; }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .toggle-btn { flex: 1; padding: 0.5rem; text-align: center; border-radius: 0.75rem; font-size: 0.875rem; font-weight: bold; transition: all 0.2s; cursor: pointer; border: 1px solid transparent; }
    .toggle-btn.active { background-color: #CDEB57; color: #0f172a; border-color: #b9d64a; box-shadow: 0 2px 10px rgba(205,235,87,0.2); }
    .toggle-btn.inactive { background-color: #f1f5f9; color: #64748b; }
    html.dark .toggle-btn.inactive { background-color: rgba(15, 23, 42, 0.5); border-color: rgba(255, 255, 255, 0.1); color: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, deleteUser, sendPasswordResetEmail } from 'firebase/auth';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy, addDoc, updateDoc, arrayUnion, arrayRemove } from 'firebase/firestore';
    import { 
        Search, MapPin, Map, Plus, User, Phone, Copy, CheckCircle2, AlertTriangle, 
        X, Loader2, Droplet, Lock, Mail, Eye, EyeOff, ArrowRight, LogOut, 
        Power, Edit2, Save, Trash2, Plane, Info, HelpCircle, Github, Globe, Moon, Sun, 
        Home, Heart, CalendarClock, ShieldCheck, RotateCcw, Stethoscope, Pill, 
        Clock, HeartHandshake, Star, Flag, FileText, Ban, AlertOctagon, Wallet, 
        Package, ChevronDown, ChevronUp, MessageSquare, Bell, HeartPulse, 
        EyeOff as EyeOffIcon 
    } from 'lucide-react';

    const firebaseConfig = {
      apiKey: "AIzaSyANXo96l5_hP1iTH_K8TaYixdGHJwr6x-0",
      authDomain: "blod-6a25b.firebaseapp.com",
      projectId: "blod-6a25b",
      storageBucket: "blod-6a25b.firebasestorage.app",
      messagingSenderId: "766563585970",
      appId: "1:766563585970:web:ad99353f2dbcbf759a1eab"
    };

    let app; try { app = initializeApp(firebaseConfig); } catch(e) {}
    const auth = getAuth(app);
    const db = getFirestore(app);
    const DONORS_COLLECTION = "donors";
    const MEDICINES_COLLECTION = "medicines"; 
    const PHARMACIES_COLLECTION = "pharmacies";
    const REPORTS_COLLECTION = "reports";
    const NOTIFICATIONS_COLLECTION = "notifications";

    const COOLDOWN_DAYS = 90;

    // --- Components ---

    function NotificationsModal({ isOpen, onClose, notifications = [], markAsRead, deleteNotification, rejectRequest, showNotification }) {
      if (!isOpen) return null;
      
      const safeNotifications = Array.isArray(notifications) ? notifications : [];
      const unreadCount = safeNotifications.filter(n => !n.read).length;

      const handleCopyText = (e, text) => {
          e.stopPropagation();
          navigator.clipboard.writeText(text);
          showNotification('success', 'تم نسخ النص');
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm animate-fadeIn p-0 sm:p-4">
          <div className="glass-panel w-full sm:max-w-md bg-white dark:bg-slate-900 rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 shadow-2xl relative border-t sm:border border-slate-200 dark:border-slate-700 animate-[translateY_0.3s_ease-out] max-h-[90vh] overflow-y-auto no-scrollbar">
            <button onClick={onClose} className="absolute top-6 left-6 p-2 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition"><X size={20}/></button>
            <h3 className="text-xl font-black text-slate-800 dark:text-white text-right mb-6 mt-2 flex items-center justify-end gap-2">
                {unreadCount > 0 && <span className="bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">{unreadCount}</span>}
                الإشعارات <Bell className="text-emerald-500 dark:text-brand-accent"/> 
            </h3>
            
            {safeNotifications.length === 0 ? (
                <div className="bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-8 border border-slate-100 dark:border-slate-800 text-center flex flex-col items-center justify-center">
                   <Bell size={40} className="text-slate-300 dark:text-slate-600 mb-3 opacity-50"/>
                   <p className="text-slate-600 dark:text-slate-300 font-bold">لا توجد إشعارات حالياً</p>
                   <p className="text-slate-400 dark:text-slate-500 text-xs mt-2 leading-relaxed">عندما يطلب أحدهم تبرعك، سيظهر لك إشعار هنا.</p>
                </div>
            ) : (
                <div className="space-y-3">
                   {safeNotifications.map(notif => {
                       const notifDate = notif.createdAt?.toDate ? new Intl.DateTimeFormat('ar-DZ', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }).format(notif.createdAt.toDate()) : 'الآن';
                       const callerPhone = notif.fromUserPhone ? (String(notif.fromUserPhone).startsWith('0') ? notif.fromUserPhone : `0${notif.fromUserPhone}`) : null;
                       const isRequest = notif.type === 'request';

                       return (
                           <div key={notif.id} className={`p-4 rounded-2xl border transition-colors text-right relative ${notif.read ? 'bg-slate-50 dark:bg-slate-900/50 border-slate-100 dark:border-slate-800 opacity-70' : 'bg-white dark:bg-slate-800 border-emerald-200 dark:border-brand-accent/30 shadow-sm'}`} onClick={() => !notif.read && markAsRead && markAsRead(notif.id)}>
                               {!notif.read && <div className="absolute top-4 left-4 w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></div>}
                               
                               <h4 className="font-bold text-slate-800 dark:text-white text-sm mb-1">{notif.title}</h4>
                               <p className="text-slate-600 dark:text-slate-300 text-xs leading-relaxed mb-3 whitespace-pre-line">{notif.body}</p>
                               
                               <div className="flex flex-col gap-2 mt-2 pt-3 border-t border-slate-100 dark:border-slate-700">
                                   {isRequest && callerPhone && (
                                       <div className="flex items-center gap-2 mb-1 w-full">
                                            <a href={`tel:${callerPhone}`} onClick={(e) => e.stopPropagation()} className="flex-1 bg-emerald-500 text-white p-2 rounded-xl text-xs font-bold text-center hover:bg-emerald-600 transition flex items-center justify-center gap-1"><Phone size={14}/> اتصال</a>
                                            <button onClick={(e) => { e.stopPropagation(); rejectRequest && rejectRequest(notif); }} className="flex-1 bg-white dark:bg-slate-900 border border-red-200 dark:border-red-500/30 text-red-500 dark:text-red-400 p-2 rounded-xl text-xs font-bold hover:bg-red-50 dark:hover:bg-red-500/10 transition flex items-center justify-center gap-1">اعتذار ❌</button>
                                       </div>
                                   )}
                                   
                                   <div className="flex items-center justify-between w-full">
                                        <div className="flex gap-2">
                                            <button onClick={(e) => handleCopyText(e, notif.body)} className="bg-slate-100 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-600 transition text-[10px] font-bold flex items-center gap-1"><Copy size={12}/> نسخ</button>
                                            <button onClick={(e) => { e.stopPropagation(); deleteNotification && deleteNotification(notif.id); }} className="bg-slate-100 dark:bg-slate-700/50 text-slate-500 dark:text-slate-400 px-3 py-1.5 rounded-lg hover:bg-red-100 hover:text-red-500 dark:hover:bg-red-500/20 dark:hover:text-red-400 transition text-[10px] font-bold flex items-center gap-1"><Trash2 size={12}/> حذف</button>
                                        </div>
                                        <span className="text-[10px] text-slate-400 font-bold">{notifDate}</span>
                                   </div>
                               </div>
                           </div>
                       )
                   })}
                </div>
            )}
          </div>
        </div>
      );
    }

    function AppHeader({ isDark, toggleTheme, setView, notifications = [], markAsRead, deleteNotification, rejectRequest, showNotification }) {
      const [showAbout, setShowAbout] = useState(false);
      const [showNotifications, setShowNotifications] = useState(false);
      const safeNotifications = Array.isArray(notifications) ? notifications : [];
      const unreadCount = safeNotifications.filter(n => !n.read).length;

      return (
        <>
          <div className="sticky top-0 z-40 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-b border-slate-200 dark:border-slate-800 px-4 py-4 flex justify-between items-center mb-6 shadow-sm relative">
             <div className="flex items-center gap-2 shrink-0">
                 <button onClick={() => setView('home')} className="w-10 h-10 glass-panel rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-emerald-600 dark:hover:text-brand-accent transition">
                    <Home size={20}/>
                 </button>
                 <button onClick={toggleTheme} className="w-10 h-10 glass-panel rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition shrink-0">
                     {isDark ? <Sun size={20}/> : <Moon size={20}/>}
                 </button>
             </div>
             <div className="absolute left-1/2 -translate-x-1/2 text-center font-black text-emerald-600 dark:text-brand-accent text-2xl tracking-wider">
                 Zomraa
             </div>
             <div className="flex items-center gap-2 shrink-0">
                 <button onClick={() => setShowNotifications(true)} className="relative w-10 h-10 glass-panel rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-emerald-500 dark:hover:text-brand-accent transition">
                    <Bell size={20}/>
                    {unreadCount > 0 && (
                        <span className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white text-[10px] font-bold flex items-center justify-center rounded-full border-2 border-white dark:border-slate-900 shadow-sm animate-pulse">
                            {unreadCount > 9 ? '+9' : unreadCount}
                        </span>
                    )}
                 </button>
                 <button onClick={() => setShowAbout(true)} className="w-10 h-10 glass-panel rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition">
                    <HelpCircle size={20}/>
                 </button>
             </div>
          </div>
          <AboutModal isOpen={showAbout} onClose={() => setShowAbout(false)} />
          <NotificationsModal isOpen={showNotifications} onClose={() => setShowNotifications(false)} notifications={safeNotifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />
        </>
      );
    }

    function CustomModal({ isOpen, title, message, onConfirm, onCancel, isDestructive, confirmText, showCancel = true }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm animate-fadeIn p-4">
          <div className="glass-panel w-full max-w-sm rounded-[2rem] p-6 shadow-2xl relative overflow-hidden">
            <div className={`w-12 h-12 rounded-full flex items-center justify-center mb-4 mx-auto relative z-10 ${isDestructive ? 'bg-red-100 dark:bg-red-500/20 text-red-500 dark:text-red-400' : 'bg-emerald-100 dark:bg-brand-accent/20 text-emerald-600 dark:text-brand-accent'}`}>{isDestructive ? <AlertTriangle size={24}/> : <Info size={24}/>}</div>
            <h3 className="text-xl font-black text-slate-800 dark:text-white text-center mb-2 relative z-10">{title}</h3>
            <p className="text-slate-500 dark:text-slate-400 text-center mb-6 text-sm leading-relaxed whitespace-pre-line relative z-10">{message}</p>
            <div className="flex gap-3 relative z-10">
              {showCancel && <button onClick={onCancel} className="flex-1 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 dark:border dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition">إلغاء</button>}
              <button onClick={onConfirm} className={`flex-1 py-3 rounded-xl font-bold transition shadow-lg ${isDestructive ? 'bg-red-500 text-white hover:bg-red-600' : 'bg-emerald-500 dark:bg-brand-accent text-white dark:text-slate-900 hover:bg-emerald-600 dark:hover:bg-brand-accentHover'}`}>{confirmText || 'تأكيد'}</button>
            </div>
          </div>
        </div>
      );
    }

    function ForgotPasswordModal({ isOpen, onClose, showNotification }) {
      const [resetEmail, setResetEmail] = useState('');
      const [loading, setLoading] = useState(false);
      if (!isOpen) return null;

      const handleReset = async (e) => {
        e.preventDefault(); if(!resetEmail) return; setLoading(true);
        try { await sendPasswordResetEmail(auth, resetEmail); showNotification('success', 'تم إرسال رابط لإعادة التعيين عبر بريدك بنجاح.'); onClose(); } 
        catch (error) { showNotification('error', 'البريد غير صحيح أو غير مسجل.'); } finally { setLoading(false); }
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm animate-fadeIn p-4">
          <div className="glass-panel w-full max-w-sm rounded-[2rem] p-8 shadow-2xl relative overflow-hidden">
            <button onClick={onClose} className="absolute top-4 left-4 p-2 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition"><X size={20}/></button>
            <div className="w-16 h-16 bg-emerald-50 dark:bg-slate-800 border border-emerald-100 dark:border-slate-700 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><Lock size={30} className="text-emerald-500 dark:text-brand-accent"/></div>
            <h3 className="text-xl font-black text-slate-800 dark:text-white text-center mb-2">نسيت كلمة المرور؟</h3>
            <p className="text-slate-500 dark:text-slate-400 text-center mb-6 text-sm leading-relaxed">أدخل بريدك المسجل لدينا.</p>
            <form onSubmit={handleReset} className="space-y-4">
                <div className="relative"><input type="email" placeholder="البريد الإلكتروني" className="custom-input w-full h-12 px-4 rounded-xl text-right pr-4 pl-12 outline-none focus:border-emerald-500 dark:focus:border-brand-accent transition-all" value={resetEmail} onChange={e => setResetEmail(e.target.value)} required /><div className="absolute left-4 top-3.5 text-slate-400 dark:text-slate-400"><Mail size={20}/></div></div>
                <button type="submit" disabled={loading} className="w-full h-12 bg-emerald-500 dark:bg-brand-accent text-white dark:text-slate-900 rounded-xl font-bold shadow-lg hover:bg-emerald-600 dark:hover:bg-brand-accentHover transition-all flex items-center justify-center gap-2">{loading ? <Loader2 className="animate-spin" size={20}/> : 'إرسال الرابط'}</button>
            </form>
          </div>
        </div>
      );
    }

    function AboutModal({ isOpen, onClose }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm animate-fadeIn p-4">
          <div className="glass-panel w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center relative">
            <button onClick={onClose} className="absolute top-4 left-4 p-2 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition"><X size={20}/></button>
            <div className="w-20 h-20 bg-emerald-50 dark:bg-slate-800 border border-emerald-100 dark:border-slate-700 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><Droplet size={40} className="text-emerald-500 dark:text-brand-accent" fill="currentColor"/></div>
            <h2 className="text-2xl font-black text-emerald-600 dark:text-brand-accent mb-1">Zomraa</h2>
            <p className="text-xs text-slate-400 dark:text-slate-500 font-bold uppercase tracking-widest mb-6">V 6.6.0 (Stable)</p>
            <div className="bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-4 mb-6 border border-slate-100 dark:border-slate-800">
               <p className="text-slate-600 dark:text-slate-300 text-sm leading-relaxed">تطبيق خيري وطبي متكامل، يهدف لربط المتبرعين بالمحتاجين، ومتابعة الصيدليات المناوبة، وتوفير الأدوية المفقودة بسهولة.</p>
            </div>
            <div className="space-y-2"><p className="text-xs font-bold text-slate-400 dark:text-slate-500">تصميم وتطوير</p><h3 className="text-lg font-bold text-slate-800 dark:text-white">مطور التطبيق</h3></div>
          </div>
        </div>
      );
    }

    function ReportModal({ isOpen, onClose, onConfirm, donorName }) {
      const [reason, setReason] = useState('');
      const [loading, setLoading] = useState(false);
      if (!isOpen) return null;

      const handleSubmit = async () => { if(!reason) return; setLoading(true); await onConfirm(reason); setLoading(false); };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm animate-fadeIn p-4">
          <div className="glass-panel w-full max-w-sm rounded-[2rem] p-6 shadow-2xl relative overflow-hidden text-right">
            <button onClick={onClose} className="absolute top-4 left-4 p-2 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition"><X size={20}/></button>
            <div className="w-12 h-12 bg-red-50 dark:bg-red-500/10 border border-red-100 dark:border-red-500/20 rounded-full flex items-center justify-center mx-auto mb-4"><Flag size={24} className="text-red-500 dark:text-red-400"/></div>
            <h3 className="text-xl font-black text-slate-800 dark:text-white text-center mb-2">إبلاغ عن متبرع</h3>
            <p className="text-slate-500 dark:text-slate-400 text-center mb-4 text-sm leading-relaxed">أنت تقوم بالإبلاغ عن <strong className="text-slate-700 dark:text-white">{donorName}</strong>. يرجى تحديد السبب لمساعدة الإدارة.</p>
            
            <div className="space-y-2 mb-6">
                {['الرقم خاطئ / لا يعمل', 'الشخص لا يرد أبداً', 'يطلب مقابلاً مالياً', 'ليس متبرعاً (حساب وهمي)'].map(r => (
                    <label key={r} className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-all ${reason === r ? 'bg-red-50 border-red-500 text-red-700 dark:bg-red-500/20 dark:border-red-400 dark:text-red-300' : 'bg-slate-50 border-slate-200 text-slate-600 dark:bg-slate-900/50 dark:border-slate-700 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
                        <input type="radio" name="reportReason" value={r} checked={reason === r} onChange={() => setReason(r)} className="w-4 h-4 accent-red-500" />
                        <span className="text-sm font-bold">{r}</span>
                    </label>
                ))}
            </div>

            <button onClick={handleSubmit} disabled={loading || !reason} className="w-full h-12 bg-red-500 text-white rounded-xl font-bold shadow-lg hover:bg-red-600 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
               {loading ? <Loader2 className="animate-spin" size={20}/> : 'تأكيد الإبلاغ'}
            </button>
          </div>
        </div>
      );
    }

    function DonorCard({ donor, user, onCopyPhone, onRate, onReport, onSendRequest }) {
      const isAvailable = donor?.status !== 0;
      const isPhoneHidden = donor?.isPhoneHidden === true;
      const safePhone = donor?.phone ? String(donor.phone) : '';
      const fullPhone = safePhone.startsWith('0') ? safePhone : `0${safePhone}`;
      const isTypeO = donor?.bloodType && String(donor.bloodType).includes('O');
      
      const safeRaters = Array.isArray(donor?.raters) ? donor.raters : [];
      const ratingCount = safeRaters.length;
      const hasRated = user && safeRaters.includes(user.uid);

      const [cooldown, setCooldown] = useState(false);
      
      useEffect(() => {
          if (!donor?.id) return;
          const lastSent = localStorage.getItem(`notify_${donor.id}`);
          if (lastSent) {
              const now = new Date().getTime();
              const diff = now - parseInt(lastSent, 10);

    function HomeView({ donors = [], user, userProfile, loading, onCopyPhone, isDark, toggleTheme, setView, showNotification, notifications = [], markAsRead, deleteNotification, rejectRequest }) {
      const [filterBlood, setFilterBlood] = useState('الكل');
      const [reportingDonor, setReportingDonor] = useState(null);

      const filtered = useMemo(() => {
        let result = (Array.isArray(donors) ? donors : []).filter(d => filterBlood === 'الكل' || d.bloodType === filterBlood);
        result.sort((a, b) => {
          const aActive = a.status !== 0 ? 1 : 0;
          const bActive = b.status !== 0 ? 1 : 0;
          return bActive - aActive; 
        });
        return result;
      }, [donors, filterBlood]);

      const closeModal = () => setModalConfig({ ...modalConfig, isOpen: false });

      const handleRate = async (donor) => {
         if (!user) { showNotification('error', 'يجب تسجيل الدخول للشكر/التقييم.'); setView('login'); return; }
         if (user.uid === donor.id) return showNotification('error', 'لا يمكنك تقييم نفسك.');
         const safeRaters = Array.isArray(donor.raters) ? donor.raters : [];
         const hasRated = safeRaters.includes(user.uid);
         try {
             await updateDoc(doc(db, DONORS_COLLECTION, donor.id), { raters: hasRated ? arrayRemove(user.uid) : arrayUnion(user.uid) });
             showNotification('success', hasRated ? 'تم إلغاء الشكر.' : 'تم إرسال شكرك للمتبرع!');
         } catch(e) { showNotification('error', 'فشل التحديث.'); }
      };

      const submitReport = async (reason) => {
         try {
             await addDoc(collection(db, REPORTS_COLLECTION), { reportedDonorId: reportingDonor.id, reportedDonorName: reportingDonor.username, reporterId: user.uid, reason: reason, status: 'pending', createdAt: serverTimestamp() });
             showNotification('success', 'تم استلام بلاغك. ستقوم الإدارة بمراجعته قريبًا.');
             setReportingDonor(null);
         } catch(e) { showNotification('error', 'حدث خطأ أثناء إرسال البلاغ.'); }
      };

      const handleSendRequest = (donor, onSuccessCallback) => {
          if (!user) { showNotification('error', 'يجب تسجيل الدخول لإرسال طلب تبرع.'); setView('login'); return; }
          if (user.uid === donor.id) return showNotification('error', 'لا يمكنك إرسال طلب لنفسك.');
          
          setModalConfig({
             isOpen: true,
             title: "تأكيد طلب التبرع",
             message: `سيتم إرسال إشعار للمتبرع "${donor.username || 'فاعل خير'}" يتضمن رقم هاتفك (${userProfile?.phone || ''}) واسمك لكي يتواصل معك. هل أنت متأكد؟`,
             isDestructive: false,
             confirmText: "إرسال الطلب",
             action: async () => {
                 try {
                     await addDoc(collection(db, NOTIFICATIONS_COLLECTION), {
                         toUserId: donor.id,
                         fromUserId: user.uid,
                         fromUserPhone: userProfile?.phone || '',
                         title: "طلب تبرع عاجل 🩸",
                         body: `المستخدم ${userProfile?.username || 'مريض'} يحتاج لتبرعك. يرجى الاتصال به على الرقم ${userProfile?.phone || ''}`,
                         type: 'request',
                         read: false,
                         createdAt: serverTimestamp()
                     });
                     showNotification('success', 'تم إرسال الإشعار بنجاح! المتبرع سيتواصل معك قريباً.');
                     if (onSuccessCallback) onSuccessCallback();
                 } catch(e) { showNotification('error', 'حدث خطأ في إرسال الإشعار.'); }
             }
         });
      };

      return (
        <div className="pb-32 font-sans" dir="rtl">
          <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />
          <div className="px-6 mb-6 mt-4">
            <h2 className="text-lg font-black text-slate-800 dark:text-white mb-3">تصفية حسب الزمرة</h2>
            <div className="flex gap-3 overflow-x-auto pb-4 no-scrollbar direction-rtl" dir="rtl">
              {['الكل', 'A+', 'A-', 'B+', 'B-', 'O+', 'O-', 'AB+', 'AB-'].map(t=><button key={t} onClick={()=>setFilterBlood(t)} className={`flex-shrink-0 h-10 px-6 rounded-full text-sm font-bold transition-all border ${filterBlood===t?'bg-brand-accent text-slate-900 border-brand-accent shadow-[0_4px_12px_rgba(205,235,87,0.2)]':'glass-panel text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white'}`}><span dir="ltr">{t}</span></button>)}
            </div>
          </div>
          
          <div className="px-2 sm:px-6">
            {loading ? (
              <div className="py-20 flex flex-col items-center gap-4"><Loader2 className="animate-spin text-emerald-500 dark:text-brand-accent" size={40}/><p className="text-slate-500 dark:text-slate-400 font-bold text-sm">جاري جلب قائمة المتبرعين...</p></div>
            ) : filtered.length === 0 ? (
              <div className="text-center py-20 glass-panel rounded-[2rem] mx-4 border border-slate-200 dark:border-slate-800">
                 <Droplet size={48} className="text-slate-300 dark:text-slate-600 mx-auto mb-4 opacity-50"/>
                 <p className="text-slate-600 dark:text-slate-300 font-bold">لا يوجد متبرعين متاحين حالياً</p>
                 <p className="text-slate-400 dark:text-slate-500 text-sm mt-2 px-4">كن أول من يتبرع في هذه الفئة!</p>
              </div>
            ) : (
              filtered.map(d => <DonorCard key={d.id} donor={d} user={user} onCopyPhone={onCopyPhone} onRate={handleRate} onReport={(d) => { if(!user) { setView('login'); showNotification('error', 'يجب تسجيل الدخول للإبلاغ.'); } else { setReportingDonor(d); } }} onSendRequest={handleSendRequest} />)
            )}
          </div>
          <ReportModal isOpen={!!reportingDonor} onClose={() => setReportingDonor(null)} onConfirm={submitReport} donorName={reportingDonor?.username} />
          <CustomModal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} isDestructive={modalConfig.isDestructive} confirmText={modalConfig.confirmText} onCancel={closeModal} onConfirm={() => { modalConfig.action(); closeModal(); }} />
        </div>
      );
    }

    function PharmacyView({ isDark, toggleTheme, pharmacies = [], onCopyPhone, setView, notifications = [], markAsRead, deleteNotification, rejectRequest, showNotification }) {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const todayStr = `${yyyy}-${mm}-${dd}`;
      const formattedDate = new Intl.DateTimeFormat('ar-DZ', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).format(today);

      const onDutyPharmacies = useMemo(() => {
        return (Array.isArray(pharmacies) ? pharmacies : []).filter(p => p.isOnDuty || (Array.isArray(p.dutyDates) && p.dutyDates.includes(todayStr)));
      }, [pharmacies, todayStr]);

      return (
        <div className="pb-32 font-sans min-h-screen" dir="rtl">
           <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />
           <div className="px-6 mb-6 mt-4 text-center">
             <h2 className="text-2xl font-black text-slate-800 dark:text-white mb-1">الصيدليات المناوبة</h2>
             <p className="text-emerald-600 dark:text-brand-accent font-bold text-sm">تحديث اليوم: {formattedDate}</p>
           </div>
           
           <div className="px-2 sm:px-6">
            {onDutyPharmacies.length === 0 ? (
              <div className="text-center py-20 glass-panel rounded-[2rem] mx-4 border border-slate-200 dark:border-slate-800">
                 <div className="w-20 h-20 mx-auto mb-4 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-full flex items-center justify-center opacity-70"><Stethoscope size={40} className="text-slate-300 dark:text-slate-600"/></div>
                 <p className="text-slate-600 dark:text-slate-300 font-bold">لا توجد صيدليات مناوبة اليوم</p>
                 <p className="text-slate-400 dark:text-slate-500 text-sm mt-2 px-4">قد تكون الإدارة لم تقم بتحديث جدول المناوبة بعد.</p>
              </div>
            ) : (
              onDutyPharmacies.map(p => <PharmacyCard key={p.id} pharmacy={p} onCopyPhone={onCopyPhone}/>)
            )}
          </div>
        </div>
      );
    }

      const [availability, setAvailability] = useState('unavailable');

      const [modalConfig, setModalConfig] = useState({ isOpen: false });

      const visibleMedicines = (Array.isArray(medicines) ? medicines : []).filter(m => m.approved === true || (user && m.requesterId === user.uid));

      const handleAddRequest = async (e) => {
        e.preventDefault();
        if (!user) { showNotification('error', 'يجب تسجيل الدخول أولاً لطلب دواء.'); setView('login'); return; }
        if(String(medName || '').length < 2 || String(quantity || '').length < 1) return;
        setAdding(true);
        try {
            await addDoc(collection(db, MEDICINES_COLLECTION), {
               medicineName: medName, quantity, hasPrescription, paymentStatus, availability, isUrgent, description: medDesc, requesterId: user.uid, requesterName: userProfile?.username || 'مريض', requesterPhone: userProfile?.phone || '', status: 'pending', fulfillerId: null, approved: false, createdAt: serverTimestamp()
            });
            showNotification('success', 'تمت إضافة طلبك، سيظهر للعامة بعد مراجعته من الإدارة.');
            setShowAddModal(false); 
            setMedName(''); setQuantity(''); setHasPrescription('yes'); setPaymentStatus('charity'); setAvailability('unavailable'); setIsUrgent(false); setMedDesc('');
        } catch(err) { showNotification('error', 'حدث خطأ أثناء الإضافة.'); } finally { setAdding(false); }

      const handleFulfill = (id, currentUserProfile) => {
         if (!user) { showNotification('error', 'يجب تسجيل الدخول للتكفل بالدواء.'); setView('login'); return; }
         setModalConfig({
             isOpen: true,
             title: "تأكيد التكفل بالدواء",

                     await updateDoc(doc(db, MEDICINES_COLLECTION, id), { status: 'in_progress', fulfillerId: user.uid, fulfillerName: currentUserProfile?.username || 'فاعل خير', fulfillerPhone: currentUserProfile?.phone || '' }); 
                     showNotification('success', 'جزاك الله خيراً! تواصل مع المريض الآن.'); 
                 } catch(e) { showNotification('error', 'حدث خطأ.'); }
             }
         });
      };

      const handleCancelFulfill = (id) => {
         setModalConfig({
             isOpen: true,
             title: "إلغاء التكفل",

             isDestructive: true,
             confirmText: "نعم، إلغاء",
             action: async () => {
                 try { 
                     await updateDoc(doc(db, MEDICINES_COLLECTION, id), { status: 'pending', fulfillerId: null, fulfillerName: null, fulfillerPhone: null }); 
                     showNotification('success', 'تم إلغاء التكفل.'); 
                 } catch(e) { showNotification('error', 'حدث خطأ.'); }
             }
         });
      };

      const handleComplete = (id) => {
         setModalConfig({
             isOpen: true,
             title: "تأكيد التسليم",
             message: "هل تم تسليم الدواء بنجاح واستلامه من قبل المريض؟",
             isDestructive: false,
             confirmText: "نعم، تم التسليم ✅",
             action: async () => {
                 try { await updateDoc(doc(db, MEDICINES_COLLECTION, id), { status: 'completed' }); showNotification('success', 'الحمد لله! تم إغلاق الطلب بنجاح.'); } 
                 catch(e) { showNotification('error', 'حدث خطأ.'); }
             }
         });
      };

      const handleDelete = (id) => {
         setModalConfig({
             isOpen: true,
             title: "حذف الطلب",
             message: "هل أنت متأكد من حذف هذا الطلب نهائياً من التطبيق؟",
             isDestructive: true,
             confirmText: "حذف نهائي",
             action: async () => {
                 try { await deleteDoc(doc(db, MEDICINES_COLLECTION, id)); showNotification('success', 'تم حذف الطلب.'); } catch(e) {}
             }
         });
      };

      return (
        <div className="pb-32 font-sans min-h-screen relative" dir="rtl">
           <AppHeader isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />
           <div className="px-6 mb-6 flex justify-between items-end mt-4">
              <div><h2 className="text-2xl font-black text-slate-800 dark:text-white mb-1">الأدوية المفقودة</h2><p className="text-slate-500 dark:text-slate-400 text-sm">منصة لطلب وتوفير الأدوية بين السكان</p></div>
              <button onClick={() => { if(!user) { setView('login'); showNotification('error', 'سجل دخولك لطلب دواء'); } else setShowAddModal(true); }} className="w-12 h-12 bg-brand-accent text-slate-900 rounded-2xl flex items-center justify-center shadow-[0_4px_15px_rgba(205,235,87,0.2)] hover:scale-105 active:scale-95 transition-all shrink-0"><Plus strokeWidth={3} size={24}/></button>
           </div>
           
           <div className="px-2 sm:px-6 mt-6">
            {loading ? (
              <div className="py-20 flex flex-col items-center gap-4"><Loader2 className="animate-spin text-emerald-500 dark:text-brand-accent" size={40}/><p className="text-slate-500 dark:text-slate-400 font-bold text-sm">جاري جلب الطلبات...</p></div>
            ) : visibleMedicines.length === 0 ? (
              <div className="text-center py-20 glass-panel rounded-[2rem] mx-4 border border-slate-200 dark:border-slate-800">
                 <div className="w-20 h-20 mx-auto mb-4 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-full flex items-center justify-center opacity-70"><Pill size={40} className="text-slate-300 dark:text-slate-600"/></div>

              </div>
            ) : (
              visibleMedicines.map(m => <MedicineCard key={m.id} medicine={m} user={user} userProfile={userProfile} onFulfill={handleFulfill} onCancelFulfill={handleCancelFulfill} onComplete={handleComplete} onDelete={handleDelete} showNotification={showNotification} />)
            )}
          </div>
          
          {showAddModal && (
             <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm animate-fadeIn p-0 sm:p-4">
               <div className="glass-panel w-full sm:max-w-lg bg-white dark:bg-slate-900 rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 shadow-2xl relative border-t sm:border border-slate-200 dark:border-slate-700 animate-[translateY_0.3s_ease-out] max-h-[90vh] overflow-y-auto no-scrollbar">
                  <button onClick={() => setShowAddModal(false)} className="absolute top-6 left-6 p-2 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition z-10"><X size={20}/></button>
                  <h2 className="text-2xl font-black text-emerald-600 dark:text-brand-accent mb-1 text-right mt-2">استمارة طلب دواء</h2>
                  <p className="text-slate-500 dark:text-slate-400 text-sm mb-6 text-right">يرجى ملء التفاصيل بدقة لمساعدتك بأسرع وقت.</p>
                  
                  <form onSubmit={handleAddRequest} className="space-y-4">

                           <input type="text" placeholder="مثال: Paracetamol 500mg" className="custom-input w-full h-12 px-4 rounded-xl text-right outline-none focus:border-emerald-500 dark:focus:border-brand-accent transition-all font-bold text-sm" value={medName} onChange={e => setMedName(e.target.value)} required />
                        </div>
                        <div>
                           <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 text-right">الكمية *</label>

                     <div>

                     </div>
                     <div>
                        <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 text-right">هل تستطيع دفع ثمنه؟ *</label>

                     </div>
                     <div>
                        <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 text-right">هل بحثت عنه في الصيدليات؟ *</label>
                        <select className="custom-input custom-select w-full h-12 px-4 rounded-xl text-right outline-none focus:border-emerald-500 dark:focus:border-brand-accent transition-all font-bold text-sm" value={availability} onChange={e => setAvailability(e.target.value)}><option value="unavailable">غير متوفر (مقطوع)</option><option value="available">متوفر لكن ثمنه غالي</option></select>
                     </div>
                     <div className="bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 p-3 rounded-xl">
                        <label className="flex items-center gap-3 cursor-pointer">
                           <input type="checkbox" className="w-5 h-5 accent-red-500 rounded cursor-pointer" checked={isUrgent} onChange={e => setIsUrgent(e.target.checked)} />
                           <span className="font-bold text-red-600 dark:text-red-400 text-sm">هذا الدواء لحالة مستعجلة جداً 🚨</span>
                        </label>
                     </div>
                     <div>
                        <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 text-right">ملاحظات إضافية (اختياري)</label>
                        <textarea placeholder="اكتب أي تفاصيل أخرى..." className="custom-input w-full h-20 p-4 rounded-xl text-right outline-none focus:border-emerald-500 dark:focus:border-brand-accent transition-all resize-none text-sm" value={medDesc} onChange={e => setMedDesc(e.target.value)}></textarea>
                     </div>
                     <button type="submit" disabled={adding} className="w-full h-14 bg-emerald-500 dark:bg-brand-accent text-white dark:text-slate-900 rounded-2xl font-black shadow-lg mt-4 flex items-center justify-center gap-2 hover:bg-emerald-600 dark:hover:bg-brand-accentHover transition-all disabled:opacity-70">
                        {adding ? <Loader2 className="animate-spin"/> : 'إرسال الطلب للإدارة'}
                     </button>
                  </form>
               </div>
             </div>
          )}
          <CustomModal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} isDestructive={modalConfig.isDestructive} confirmText={modalConfig.confirmText} onCancel={closeModal} onConfirm={() => { modalConfig.action(); closeModal(); }} />
        </div>
      )
    }

    function LoginView({ setView, showNotification }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [loading, setLoading] = useState(false);
      const [showForgotModal, setShowForgotModal] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          await signInWithEmailAndPassword(auth, email.trim(), password);
          showNotification('success', 'تم الدخول بنجاح');
          setView('profile'); 
        } catch (error) { 
          if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') { showNotification('error', 'البريد أو كلمة المرور غير صحيحة.'); } 
          else { showNotification('error', 'حدث خطأ في الاتصال، يرجى المحاولة مجدداً.'); }
          setLoading(false); 
        }
      };

      return (

    function RegisterView({ setView, showNotification }) {
      const [formData, setFormData] = useState({ username: '', email: '', password: '', phone: '', neighborhood: '', municipality: 'الأمير عبد القادر', bloodType: 'A+' });
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (formData.phone.length < 10) return showNotification('error', 'رقم الهاتف قصير جداً');
        setLoading(true);
        try {
          const cred = await createUserWithEmailAndPassword(auth, formData.email.trim(), formData.password);
          await setDoc(doc(db, DONORS_COLLECTION, cred.user.uid), { uid: cred.user.uid, ...formData, status: 1, raters: [], isPhoneHidden: false, createdAt: serverTimestamp(), lastDonationDate: null });
          showNotification('success', 'تم إنشاء الحساب بنجاح!');
          setView('profile');
        } catch (error) {
          let msg = 'فشل التسجيل. تأكد من البيانات.';
          if (error.code === 'auth/email-already-in-use') msg = 'البريد مستخدم بالفعل.';
          else if (error.code === 'auth/weak-password') msg = 'كلمة المرور ضعيفة.';
          showNotification('error', msg); setLoading(false);

                 <div className="grid grid-cols-2 gap-3"><input value="الأمير عبد القادر" disabled className="custom-input h-12 rounded-xl px-4 outline-none text-right opacity-70 cursor-not-allowed bg-slate-100 dark:bg-slate-900/50" /><input placeholder="الحي / الدوار" className="custom-input h-12 rounded-xl px-4 outline-none text-right focus:border-emerald-500 dark:focus:border-brand-accent transition-colors" onChange={e => setFormData({...formData, neighborhood: e.target.value})} required/></div>

                  <div className={`absolute bottom-0 right-0 w-6 h-6 rounded-full border-[3px] border-white dark:border-slate-900 ${isAvailable && isEligibleToDonate ? 'bg-emerald-500 dark:bg-brand-accent shadow-[0_0_10px_#CDEB57]' : 'bg-slate-400 dark:bg-slate-500'}`}></div>

               <div className="flex items-center gap-2 justify-center w-full mb-2">
                  {isEditingUsername ? ( <div className="flex items-center gap-1 glass-panel p-1 rounded-xl"><input value={newUsername} onChange={e=>setNewUsername(e.target.value)} className="w-40 text-center bg-slate-50 dark:bg-slate-900 rounded-lg px-2 py-1 outline-none font-bold" /><button onClick={()=>handleUpdateField('username', newUsername, setIsEditingUsername)} className="bg-brand-accent text-slate-900 p-1.5 rounded-lg"><Save size={16}/></button><button onClick={()=>setIsEditingUsername(false)} className="bg-red-100 dark:bg-red-500/20 text-red-500 p-1.5 rounded-lg"><X size={16}/></button></div> ) : ( <h2 className="text-2xl font-black text-slate-800 dark:text-white flex items-center gap-2">{donorData.username}<button onClick={()=>setIsEditingUsername(true)} className="text-slate-400 dark:text-slate-500"><Edit2 size={16}/></button></h2> )}

                  {isEditingPhone ? ( <div className="flex items-center gap-1 glass-panel p-1 rounded-xl"><input value={newPhone} onChange={e=>setNewPhone(e.target.value)} className="w-32 text-center bg-slate-50 dark:bg-slate-900 rounded-lg px-2 py-1 outline-none font-bold" dir="ltr"/><button onClick={()=>handleUpdateField('phone', newPhone, setIsEditingPhone)} className="bg-brand-accent text-slate-900 p-1.5 rounded-lg"><Save size={16}/></button><button onClick={()=>setIsEditingPhone(false)} className="bg-red-100 dark:bg-red-500/20 text-red-500 p-1.5 rounded-lg"><X size={16}/></button></div> ) : ( <div className="flex items-center gap-2 glass-panel px-4 py-1.5 rounded-full"><Phone size={14} className="text-slate-400 dark:text-slate-500"/><span className="text-slate-700 dark:text-slate-300 font-bold" dir="ltr">{donorData.phone}</span><button onClick={()=>setIsEditingPhone(true)} className="text-emerald-600 dark:text-brand-accent p-1 rounded-full"><Edit2 size={14}/></button></div> )}
               </div>

               <div className="flex items-center gap-2">
                  {isEditingNeighborhood ? ( <div className="flex items-center gap-1 glass-panel p-1 rounded-xl"><input value={newNeighborhood} onChange={e=>setNewNeighborhood(e.target.value)} className="w-32 text-center bg-slate-50 dark:bg-slate-900 rounded-lg px-2 py-1 outline-none font-bold"/><button onClick={()=>handleUpdateField('neighborhood', newNeighborhood, setIsEditingNeighborhood)} className="bg-brand-accent text-slate-900 p-1.5 rounded-lg"><Save size={16}/></button><button onClick={()=>setIsEditingNeighborhood(false)} className="bg-red-100 dark:bg-red-500/20 text-red-500 p-1.5 rounded-lg"><X size={16}/></button></div> ) : ( <div className="flex items-center gap-2 bg-slate-100 dark:bg-slate-800/50 px-4 py-1.5 rounded-full text-sm"><MapPin size={14} className="text-slate-400 dark:text-slate-500"/><span className="text-slate-600 dark:text-slate-400 font-medium">{donorData.neighborhood || 'الأمير عبد القادر'}</span><button onClick={()=>setIsEditingNeighborhood(true)} className="text-slate-400 hover:text-emerald-600 dark:hover:text-brand-accent"><Edit2 size={12}/></button><span className="mx-1 text-slate-300 dark:text-slate-700">•</span><span dir="ltr" className="font-bold text-emerald-600 dark:text-brand-accent">{donorData.bloodType}</span></div> )}
               </div>
            </div>

            {!isEligibleToDonate && (
                <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-500/30 rounded-2xl p-4 mb-4 text-center animate-fadeIn relative"><button onClick={handleCancelCooldown} className="absolute top-2 left-2 p-2 bg-white/50 dark:bg-slate-950/20 text-blue-400 hover:text-blue-600 flex items-center gap-1 text-[10px] font-bold rounded-full"><RotateCcw size={14}/> إلغاء بالخطأ</button><CalendarClock size={28} className="text-blue-500 dark:text-blue-400 mx-auto mb-2 mt-2" /><h4 className="font-bold text-blue-700 dark:text-blue-300 mb-1">فترة نقاهة صحية</h4><div className="bg-white dark:bg-slate-900/50 py-2 rounded-xl text-blue-800 dark:text-white font-black mx-4 mt-2">متبقي {daysRemaining} يوماً</div></div>
            )}

            <div className="flex gap-4 mb-4">
                <div onClick={!loading && isEligibleToDonate ? toggleStatus : undefined} className={`flex-1 relative overflow-hidden rounded-[2rem] p-5 shadow-xl transition-all transform ${isEligibleToDonate ? 'cursor-pointer active:scale-95 glass-panel' : 'opacity-60 bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-800'} ${!isAvailable && isEligibleToDonate ? 'opacity-70 grayscale' : ''}`}>
                   <div className={`absolute top-0 left-0 w-full h-1 ${(isAvailable && isEligibleToDonate) ? 'bg-emerald-500 dark:bg-brand-accent shadow-[0_0_15px_#CDEB57]' : 'bg-slate-300 dark:bg-slate-600'}`}></div>

                       <h3 className="font-black text-slate-800 dark:text-white mb-2 text-sm">{isAvailable ? 'متاح للعامة' : 'حساب مخفي'}</h3>

                   <div className="flex flex-col items-center text-center">
                       <h3 className="font-black text-slate-800 dark:text-white mb-2 text-sm">{!donorData.isPhoneHidden ? 'رقمي ظاهر' : 'رقمي مخفي'}</h3>

    function App() {
      const [user, setUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [donors, setDonors] = useState([]);
      const [medicines, setMedicines] = useState([]); 
      const [pharmacies, setPharmacies] = useState([]);
      const [notifications, setNotifications] = useState([]); 
      const [view, setView] = useState('home');
      const [loading, setLoading] = useState(true);
      const [loadingMed, setLoadingMed] = useState(true);
      const [loadingPharmacies, setLoadingPharmacies] = useState(true);
      const [notification, setNotification] = useState(null); 
      const [initializing, setInitializing] = useState(true);
      const [modalConfig, setModalConfig] = useState({ isOpen: false });
      
      const [isDark, setIsDark] = useState(() => { const saved = localStorage.getItem('theme'); return saved ? saved === 'dark' : false; });

      useEffect(() => {
        if (isDark) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
        else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
      }, [isDark]);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          if (u) {
            setUser(u);
            onSnapshot(doc(db, DONORS_COLLECTION, u.uid), (d) => {
              if (d.exists()) { setUserProfile({ id: d.id, ...d.data() }); } 
              if (initializing) setInitializing(false);
            }, (err) => { if (initializing) setInitializing(false); });
            
            onSnapshot(query(collection(db, NOTIFICATIONS_COLLECTION), orderBy('createdAt', 'desc')), (s) => { 
                const myNotifs = s.docs.map(d => ({ id: d.id, ...d.data() })).filter(n => n.toUserId === u.uid);
                setNotifications(myNotifs);
            });

          } else {
            setUser(null); setUserProfile(null); setNotifications([]);
            if(view === 'profile') setView('home');
            if (initializing) setInitializing(false);
          }
        });
        return () => unsubscribe();
      }, [initializing, view]); 

      useEffect(() => {
        const unsubDonors = onSnapshot(query(collection(db, DONORS_COLLECTION), orderBy('createdAt', 'desc')), (s) => { setDonors(s.docs.map(d => ({ id: d.id, ...d.data() }))); setLoading(false); }, () => setLoading(false));
        const unsubMedicines = onSnapshot(query(collection(db, MEDICINES_COLLECTION), orderBy('createdAt', 'desc')), (s) => { setMedicines(s.docs.map(d => ({ id: d.id, ...d.data() }))); setLoadingMed(false); }, () => setLoadingMed(false));
        const unsubPharmacies = onSnapshot(query(collection(db, PHARMACIES_COLLECTION), orderBy('createdAt', 'desc')), (s) => { setPharmacies(s.docs.map(d => ({ id: d.id, ...d.data() }))); setLoadingPharmacies(false); }, () => setLoadingPharmacies(false));
        return () => { unsubDonors(); unsubMedicines(); unsubPharmacies(); };
      }, []);

      const showNotification = (type, msg) => { setNotification({ type, msg }); setTimeout(() => setNotification(null), 3500); };
      const handleCopy = (phone) => { navigator.clipboard.writeText(phone); showNotification('success', 'تم النسخ'); };
      const toggleTheme = () => setIsDark(!isDark);
      const closeModal = () => setModalConfig({ ...modalConfig, isOpen: false });

      const markAsRead = async (id) => { try { await updateDoc(doc(db, NOTIFICATIONS_COLLECTION, id), { read: true }); } catch(e){} };
      const deleteNotification = async (id) => { try { await deleteDoc(doc(db, NOTIFICATIONS_COLLECTION, id)); } catch(e){} };

      const rejectRequest = (notif) => {
          if (!user || !userProfile) return;
          setModalConfig({
             isOpen: true,
             title: "الاعتذار عن التبرع",
             message: "هل أنت متأكد أنك تريد إرسال اعتذار لهذا الشخص؟ سيتم إخباره بأنك غير متاح حالياً وحذف هذا الطلب من إشعاراتك.",
             isDestructive: true,
             confirmText: "نعم، أرسل اعتذار",
             action: async () => {
                 try {
                     await addDoc(collection(db, NOTIFICATIONS_COLLECTION), {
                         toUserId: notif.fromUserId,
                         fromUserId: user.uid,
                         title: "اعتذار عن التبرع 😔",
                         body: `نعتذر، المتبرع "${userProfile.username || 'فاعل خير'}" غير متاح للتبرع في الوقت الحالي (قد يكون مشغولاً أو في فترة نقاهة).\nنسأل الله العظيم أن يشفي مريضكم ويعافيه.`,
                         type: 'info',
                         read: false,
                         createdAt: serverTimestamp()
                     });
                     await deleteDoc(doc(db, NOTIFICATIONS_COLLECTION, notif.id));
                     showNotification('success', 'تم إرسال الاعتذار بنجاح.');
                 } catch(e) { showNotification('error', 'حدث خطأ.'); }
             }
         });
      };

      if (initializing) return <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950"><Loader2 className="animate-spin text-emerald-500 dark:text-brand-accent" size={48}/></div>;

      return (
        <div className="min-h-screen relative">
          {view === 'home' && <HomeView donors={donors} user={user} userProfile={userProfile} loading={loading} onCopyPhone={handleCopy} isDark={isDark} toggleTheme={toggleTheme} setView={setView} showNotification={showNotification} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} />}
          {view === 'pharmacy' && <PharmacyView pharmacies={pharmacies} onCopyPhone={handleCopy} isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />}
          {view === 'medicines' && <MedicinesView user={user} userProfile={userProfile} medicines={medicines} loading={loadingMed} isDark={isDark} toggleTheme={toggleTheme} setView={setView} showNotification={showNotification} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} />}
          {view === 'doctors' && <DoctorsView isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} showNotification={showNotification} />}
          {view === 'login' && <LoginView setView={setView} showNotification={showNotification} />}
          {view === 'register' && <RegisterView setView={setView} showNotification={showNotification} />}
          {view === 'profile' && <ProfileView user={user} donorData={userProfile} showNotification={showNotification} isDark={isDark} toggleTheme={toggleTheme} setView={setView} notifications={notifications} markAsRead={markAsRead} deleteNotification={deleteNotification} rejectRequest={rejectRequest} />}
          
          <BottomNav view={view} setView={setView} user={user} />

          {notification && (
            <div className={`fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl border z-[110] flex items-center gap-2 font-bold animate-fadeIn w-max max-w-[90%] ${notification.type === 'success' ? 'bg-brand-accent text-slate-900 border-brand-accentHover' : 'glass-panel text-red-500 dark:text-red-400 border-red-200 dark:border-red-500/30'}`}>
              {notification.type === 'success' ? <CheckCircle2 size={18} className="flex-shrink-0"/> : <AlertTriangle size={18} className="flex-shrink-0"/>} 
              <span className="text-sm">{notification.msg}</span>
            </div>
          )}
          <CustomModal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} isDestructive={modalConfig.isDestructive} confirmText={modalConfig.confirmText} onCancel={closeModal} onConfirm={() => { modalConfig.action(); closeModal(); }} />
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
